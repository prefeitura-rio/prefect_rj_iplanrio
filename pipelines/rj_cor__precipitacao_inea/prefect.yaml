# Teste em staging..
name: rj_cor__precipitacao_inea
prefect-version: 3.4.3

build:
  - prefect.deployments.steps.run_shell_script:
      id: get-commit-hash
      script: git rev-parse --short HEAD
      stream_output: false
  - prefect_docker.deployments.steps.build_docker_image:
      id: build-image
      requires: prefect-docker>=0.6.5
      image_name: ghcr.io/prefeitura-rio/prefect_rj_iplanrio/deployments
      tag: "rj_cor__precipitacao_inea-{{ get-commit-hash.stdout }}"
      dockerfile: pipelines/rj_cor__precipitacao_inea/Dockerfile

push:
  - prefect_docker.deployments.steps.push_docker_image:
      requires: prefect-docker>=0.6.5
      image_name: "{{ build-image.image_name }}"
      tag: "{{ build-image.tag }}"

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /opt/prefect/prefect_rj_iplanrio

deployments:
  - name: rj-cor--precipitacao-inea--staging
    version: "{{ build-image.tag }}"
    entrypoint: pipelines/rj_cor__precipitacao_inea/flow.py:rj_cor__precipitacao_inea
    work_pool:
      name: k3s-pool
      work_queue_name: default
      job_variables:
        image: "{{ build-image.image_name }}:{{ build-image.tag }}"
        command: uv run --package rj_cor__precipitacao_inea -- prefect flow-run execute
        secretName: prefect-jobs-secrets
        image_pull_policy: Always

  - name: rj-cor--precipitacao-inea--prod
    version: "{{ get-commit-hash.stdout }}"
    entrypoint: pipelines/rj_cor__precipitacao_inea/flow.py:rj_cor__precipitacao_inea
    work_pool:
      name: k3s-pool
      work_queue_name: default
      job_variables:
        image: "{{ build-image.image_name }}:{{ build-image.tag }}"
        command: uv run --package rj_cor__precipitacao_inea -- prefect flow-run execute
        secretName: prefect-jobs-secrets
        image_pull_policy: Always
    schedules:
      - interval: 300
        anchor_date: "2023-01-01T00:01:00"
        timezone: America/Sao_Paulo
        slug: precipitacao-inea-5min
        parameters:
          dataset_id_pluviometric: "clima_pluviometro"
          table_id_pluviometric: "taxa_precipitacao_inea"
          dataset_id_fluviometric: "clima_fluviometro"
          table_id_fluviometric: "lamina_agua_inea"
          dump_mode: "append"
