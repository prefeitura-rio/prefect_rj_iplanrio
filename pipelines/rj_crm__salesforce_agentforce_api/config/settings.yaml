      SELECT ssot__Id__c, ssot__SubscriberId__c, ssot__JobId__c,
             ssot__EventDate__c, ssot__CreatedDate__c
      FROM MCE_Sent__dlm
      WHERE ssot__EventDate__c >= '{watermark}'
    target_table: mce_sent
    write_mode: append
    primary_key: id
    partition_by: data_particao
    watermark_col: ssot__EventDate__c
    is_optional: true

  - name: mce_open
    phase: "2b"
    source: data_cloud
    dmo: MCE_Open__dlm
    query: >
      SELECT ssot__Id__c, ssot__SubscriberId__c, ssot__JobId__c,
             ssot__EventDate__c, ssot__CreatedDate__c
      FROM MCE_Open__dlm
      WHERE ssot__EventDate__c >= '{watermark}'
    target_table: mce_open
    write_mode: append
    primary_key: id
    partition_by: data_particao
    watermark_col: ssot__EventDate__c
    is_optional: true

  - name: mce_click
    phase: "2b"
    source: data_cloud
    dmo: MCE_Click__dlm
    query: >
      SELECT ssot__Id__c, ssot__SubscriberId__c, ssot__JobId__c,
             ssot__LinkUrl__c, ssot__EventDate__c, ssot__CreatedDate__c
      FROM MCE_Click__dlm
      WHERE ssot__EventDate__c >= '{watermark}'
    target_table: mce_click
    write_mode: append
    primary_key: id
    partition_by: data_particao
    watermark_col: ssot__EventDate__c
    is_optional: true

  - name: mce_bounce
    phase: "2b"
    source: data_cloud
    dmo: MCE_Bounce__dlm
    query: >
      SELECT ssot__Id__c, ssot__SubscriberId__c, ssot__JobId__c,
             ssot__BounceCategory__c, ssot__EventDate__c, ssot__CreatedDate__c
      FROM MCE_Bounce__dlm
      WHERE ssot__EventDate__c >= '{watermark}'
    target_table: mce_bounce
    write_mode: append
    primary_key: id
    partition_by: data_particao
    watermark_col: ssot__EventDate__c
    is_optional: true

  - name: mce_unsub
    phase: "2b"
    source: data_cloud
    dmo: MCE_Unsub__dlm
    query: >
      SELECT ssot__Id__c, ssot__SubscriberId__c, ssot__JobId__c,
             ssot__EventDate__c, ssot__CreatedDate__c
      FROM MCE_Unsub__dlm
      WHERE ssot__EventDate__c >= '{watermark}'
    target_table: mce_unsub
    write_mode: append
    primary_key: id
    partition_by: data_particao
    watermark_col: ssot__EventDate__c
    is_optional: true

  - name: mce_subscriber
    phase: "2b"
    source: data_cloud
    dmo: MCE_Subscriber__dlm
    query: >
      SELECT ssot__Id__c, ssot__SubscriberKey__c, ssot__EmailAddress__c,
             ssot__Status__c, ssot__CreatedDate__c
      FROM MCE_Subscriber__dlm
      WHERE ssot__CreatedDate__c >= '{watermark}'
    target_table: mce_subscriber
    write_mode: append
    primary_key: id
    partition_by: data_particao
    watermark_col: ssot__CreatedDate__c
    is_optional: true

  # ---------------------------------------------------------------------------
  # Fase 3 — Platform Tracing (chunked — GRANDES VOLUMES)
  # ---------------------------------------------------------------------------

  - name: telemetry_trace_span
    phase: 3
    source: data_cloud_chunked
    dmo: TelemetryTraceSpan__dlm
    query: >
      SELECT
        ssot__Id__c,
        ssot__TraceId__c,
        ssot__SpanId__c,
        ssot__ParentSpanId__c,
        ssot__SpanName__c,
        ssot__SpanKind__c,
        ssot__StartTimeNs__c,
        ssot__EndTimeNs__c,
        ssot__DurationNs__c,
        ssot__Status__c,
        ssot__ServiceName__c,
        ssot__CreatedDate__c
      FROM TelemetryTraceSpan__dlm
      WHERE ssot__CreatedDate__c >= '{watermark}'
    target_table: telemetry_trace_span
    staging_table: telemetry_trace_span_staging
    write_mode: merge
    primary_key: id
    partition_by: data_particao
    watermark_col: ssot__CreatedDate__c
    duration_ns_columns:
      - duration_ns
      - start_time_ns  # estes são convertidos para ms após normalização
      - end_time_ns
    chunk_size: 50000
    is_optional: true
    expurgo_days: 365

  # ---------------------------------------------------------------------------
  # Fase 4 — GenAI Audit (Data Cloud DMOs — opcional)
  # ---------------------------------------------------------------------------

  - name: genai_gateway_request
    phase: 4
    source: data_cloud
    dmo: GenAIGatewayRequest__dlm
