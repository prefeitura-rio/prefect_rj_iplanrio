name: rj_ssm__compstat
prefect-version: 3.4.3

build:
  - prefect.deployments.steps.run_shell_script:
      id: get-commit-hash
      script: git rev-parse --short HEAD
      stream_output: false
  - prefect_docker.deployments.steps.build_docker_image:
      id: build-image
      requires: prefect-docker>=0.6.5
      image_name: ghcr.io/prefeitura-rio/prefect_rj_iplanrio/deployments
      tag: "rj_ssm__compstat-{{ get-commit-hash.stdout }}"
      dockerfile: pipelines/rj_ssm__compstat/Dockerfile

push:
  - prefect_docker.deployments.steps.push_docker_image:
      requires: prefect-docker>=0.6.5
      image_name: "{{ build-image.image_name }}"
      tag: "{{ build-image.tag }}"

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /opt/prefect/prefect_rj_iplanrio

deployments:
  - name: rj-ssm--compstat--staging
    version: "{{ build-image.tag }}"
    entrypoint: pipelines/rj_ssm__compstat/flow.py:rj_ssm__compstat
    work_pool:
      name: k3s-pool
      work_queue_name: default
      job_variables:
        image: "{{ build-image.image_name }}:{{ build-image.tag }}"
        command: uv run --package rj_ssm__compstat -- prefect flow-run execute
        secretName: prefect-jobs-secrets
        image_pull_policy: Always
  - name: rj-ssm--compstat--prod
    version: "{{ get-commit-hash.stdout }}"
    entrypoint: pipelines/rj_ssm__compstat/flow.py:rj_ssm__compstat
    work_pool:
      name: k3s-pool
      work_queue_name: default
      job_variables:
        image: "{{ build-image.image_name }}:{{ build-image.tag }}"
        command: uv run --package rj_ssm__compstat -- prefect flow-run execute
        secretName: prefect-jobs-secrets
        image_pull_policy: Always

    schedules:
    # Tabela de blitzes da Lei Seca
    - interval: 86400
      anchor_date: "2022-01-01T01:00:00" # Data de inicio do schedule em UTC
      timezone: America/Sao_Paulo
      slug: "blitz_lei_seca" # slug do schedule
      parameters:
        dataset_id: "bruto_api_compstat"
        table_id: "blitz_lei_seca"
        dump_mode: "overwrite"
        result: "blitzes"
        endpoint: "blitz-leiseca"

    - interval: 86400
      anchor_date: "2022-01-01T01:00:00" # Data de inicio do schedule em UTC
      timezone: America/Sao_Paulo
      slug: "blitz_lei_seca" # slug do schedule
      parameters:
        dataset_id: "bruto_api_compstat"
        table_id: "subareas"
        dump_mode: "overwrite"
        result: "subareas"
        endpoint: "qmd"