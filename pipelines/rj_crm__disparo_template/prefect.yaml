            \        WHEN templateId IN ({id_hsm_legado_lembrete_placeholder}) THEN
            '{nome_hsm_lembrete_placeholder}'\n        WHEN templateId IN ({id_hsm_legado_agradecimento_placeholder})
            THEN '{nome_hsm_agradecimento_placeholder}'\n    END as id_hsm,\n    --
            failedDate vem como TIMESTAMP na wetalkie; falha_datahora é DATETIME na
            status_disparo,\n    -- precisa converter pro mesmo tipo pra não quebrar
            o UNION ALL (erro: incompatible types DATETIME, TIMESTAMP)\n    DATETIME(failedDate,
            'America/Sao_Paulo') as failedDate\n    from `rj-crm-registry.brutos_wetalkie_staging.fluxo_atendimento_*`\n\
            \    where templateid in ({id_hsm_legado_cobranca_placeholder}, {id_hsm_legado_lembrete_placeholder},
