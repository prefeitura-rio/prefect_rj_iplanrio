            \ FROM `rj-crm-registry-dev.dev__dev_fantasma__divida_ativa.contribuinte`
            AS contribuinte\n    INNER JOIN disparos_filtro ON lpad(cpf_cnpj, 11,
            \"0\") = disparos_filtro.cpf\n),\n\ndivida_ativa as (\n    select\n  \
            \  filtra_contribuinte.* except(guias_pagamento),\n    guia_pagamento.data_criacao_guia,\n\
            \    guia_pagamento.id_guia_pagamento,\n    cotas.id_cota_guia_pagamento,\n\
