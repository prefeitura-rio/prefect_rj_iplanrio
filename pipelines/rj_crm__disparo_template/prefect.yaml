            \    from telefones\n    left join dados_rmi using(cpf)\n),\n-- Substitui
            a leitura de rj-crm-registry.brutos_wetalkie_staging.fluxo_atendimento_*\n
            -- (só tinha histórico da API antiga da Wetalkie) por\n-- rj-crm-registry.brutos_salesforce.status_disparo
            (alimentada pelos disparos via SFTP/Salesforce).\n-- Chave de busca agora
            é nome_hsm (STRING, == campaign_name), não mais templateId (INT64 da Wetalkie).\n
            status_final_telefone AS (\n    -- verifica se telefones já tiveram falha,
            passo necessário já que o telefone principal não vem do RMI. Caso contrário,
            seria só necessário filtrar pela estratégia de envio\n    -- qualquer
            falha conta (não só o código 131026 de \"número sem WhatsApp\")\n    SELECT\n\
            \        contato_telefone AS flatTarget,\n        indicador_quarentena
            AS falhou\n    FROM `rj-crm-registry.brutos_salesforce.status_disparo`\n\
            \    QUALIFY ROW_NUMBER() OVER (\n        PARTITION BY contato_telefone\n\
            \        ORDER BY envio_datahora DESC\n    ) = 1\n),\nfiltra_falhas AS
            (\n    SELECT\n        distinct\n        s.* EXCEPT(celular_disparo_1,
            celular_disparo_2, celular_disparo_3, celular_disparo_rmi),\n\n      \
            \  IF(f1.falhou, NULL, s.celular_disparo_1) AS celular_disparo_1,\n  \
            \      IF(f2.falhou, NULL, s.celular_disparo_2) AS celular_disparo_2,\n\
            \        IF(f3.falhou, NULL, s.celular_disparo_3) AS celular_disparo_3,\n\
            \        IF(f4.falhou, NULL, s.celular_disparo_rmi) AS celular_disparo_rmi,\n\
            \n        COALESCE(\n        IF(f1.falhou, NULL, s.celular_disparo_1),\n\
            \        IF(f2.falhou, NULL, s.celular_disparo_2),\n        IF(f3.falhou,
            NULL, s.celular_disparo_3),\n        IF(f4.falhou, NULL, s.celular_disparo_rmi)\n\
            \        ) AS celular_disparo\n\n    FROM enriquece_rmi s\n    LEFT JOIN
            status_final_telefone f1\n        ON f1.flatTarget = s.celular_disparo_1\n\
            \n    LEFT JOIN status_final_telefone f2\n        ON f2.flatTarget = s.celular_disparo_2\n\
            \n    LEFT JOIN status_final_telefone f3\n        ON f3.flatTarget = s.celular_disparo_3\n\
            \n    LEFT JOIN status_final_telefone f4\n        ON f4.flatTarget = s.celular_disparo_rmi\n
            ),\nfiltra_recebeu_primeira_hsm as (\n    -- verifica se esse cpf recebeu
            a primeira mensagem (D0, nome_hsm_anterior_placeholder) nos últimos 50
            dias,\n    -- tanto via status_disparo quanto via wetalkie (histórico
            legado pré-migração;\n    -- id_hsm_anterior_legado_placeholder = templateId
            da HSM D0)\n    select distinct filtra_falhas.*\n    FROM filtra_falhas\n\
            \    left join `rj-crm-registry.brutos_salesforce.status_disparo` sd\n\
            \            on sd.cpf = filtra_falhas.cpf\n            and sd.nome_hsm
            = '{nome_hsm_anterior_placeholder}'\n            and sd.envio_datahora
            >= DATETIME_SUB(CURRENT_DATETIME('America/Sao_Paulo'), INTERVAL 50 DAY)\n\
            \            and sd.data_particao >= DATE_SUB(CURRENT_DATE(), INTERVAL
            51 DAY)\n    left join `rj-crm-registry.brutos_wetalkie_staging.fluxo_atendimento_*`
            fl\n            on fl.targetexternalid = filtra_falhas.cpf\n         \
            \   and fl.templateId = {id_hsm_anterior_legado_placeholder}\n       \
            \     and fl.createDate >= TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL
            50 DAY)\n            and fl.status in ('PROCESSING', 'SENT')\n       \
            \ where sd.cpf is not null or fl.flattarget is not null\n),\nfiltra_disparados
            as (\n    -- verifica se esse cpf já recebeu essa mesma mensagem (nome_hsm_placeholder)
            nos últimos x dias,\n    -- tanto via status_disparo quanto via wetalkie
            (histórico legado pré-migração;\n    -- id_hsm_legado_placeholder = templateId(s)
            legado(s) dessa pesquisa)\n    select filtra_recebeu_primeira_hsm.*\n\
            \    FROM filtra_recebeu_primeira_hsm\n    left join `rj-crm-registry.brutos_salesforce.status_disparo`
            sd\n            on sd.cpf = filtra_recebeu_primeira_hsm.cpf\n        \
            \    and sd.nome_hsm = '{nome_hsm_placeholder}'\n            and sd.envio_datahora
            >= DATETIME_SUB(CURRENT_DATETIME('America/Sao_Paulo'), INTERVAL {intervalo_filtro_disparados}
            DAY)\n            and sd.data_particao >= DATE_SUB(CURRENT_DATE(), INTERVAL
            {intervalo_filtro_disparados} DAY)\n            and sd.indicador_quarentena
            = FALSE\n    left join `rj-crm-registry.brutos_wetalkie_staging.fluxo_atendimento_*`
            fl\n            on fl.targetexternalid = filtra_recebeu_primeira_hsm.cpf\n\
            \            and fl.templateId IN ({id_hsm_legado_placeholder})\n    \
            \        and fl.createDate >= TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL
            {intervalo_filtro_disparados} DAY)\n            and fl.status in ('PROCESSING',
            'SENT')\n        where sd.cpf is null and fl.flattarget is null\n),\n
            final as (\n    select filtra_disparados.*\n    from filtra_disparados\n
            )\n-- Tabela simples (sem TO_JSON_STRING). 'externalId' (dedup por CPF)
            e 'others'\n-- (retentativas) são controle interno; o de_columns de cada
            schedule decide quais\n-- colunas (ex.: nome) realmente vão pra Data Extension.\n\
            SELECT\n    celular_disparo AS telefone,\n    CAST(cpf AS STRING) AS SubscriberKey,\n\
            \    CAST(cpf AS STRING) AS externalId,\n    INITCAP(\n        IF(\n \
            \           ARRAY_LENGTH(SPLIT(nome, ' ')) > 1,\n            CONCAT(SPLIT(nome,
            ' ')[SAFE_OFFSET(0)], ' '),\n            nome\n        )\n    ) AS nome,\n\
            \    CAST(DATE_DIFF(CURRENT_DATE('America/Sao_Paulo'), DATE(data_alta_internacao),
            DAY) AS STRING) AS numero_dias,\n    ARRAY(SELECT x FROM UNNEST([celular_disparo_2,
            celular_disparo_3]) AS x WHERE x IS NOT NULL AND x != celular_disparo)
            AS others\nfrom final\nwhere celular_disparo is not null\n"
      - interval: 86400
        anchor_date: "2021-01-01T13:00:00"
        timezone: America/Sao_Paulo
        active: false
        slug: daily-cadunico-confirma-agendamento
        flow_run_name: cadunico-confirma-agendamento
        parameters:
          flow_environment: staging
          query_replacements: {"days_ahead_placeholder": 2, "nome_hsm_placeholder": "confirma_agendamento_cadunico_prod_v2",
            "intervalo_filtro_disparados": 15, "id_hsm_legado_placeholder": 101}
          campaign_name: confirma_agendamento_cadunico_prod_v2
          data_extension_filename: whatsapp_cadunico_
          de_columns: ["nome_sobrenome", "unidade_cras", "data", "hora", "endereco"]
          dataset_id: brutos_salesforce
          table_id: disparos_efetuados
          dump_mode: append
          test_mode: true
          sleep_minutes: 5
          filter_dispatched_phones_or_cpfs:
          filter_duplicated_phones: false
          filter_duplicated_cpfs: true
          whitelist_percentage: 0
          infisical_secret_path: "/crm_disparo_template"
          whitelist_environment: "production"
          query: "WITH\nsegmentacao_original AS (\n    SELECT\n        LPAD(CAST(cpf
            AS STRING), 11, '0') AS cpf,\n        `rj-crm-registry.udf.VALIDATE_AND_FORMAT_CELLPHONE`(REGEXP_REPLACE(telefone,
            r'[^\\d]', '')) AS celular_disparo,\n        INITCAP(\n            IF(\n\
            \                ARRAY_LENGTH(SPLIT(nome_completo, ' ')) > 1,\n      \
            \          CONCAT(\n                    SPLIT(nome_completo, ' ')[SAFE_OFFSET(0)],\n\
            \                    ' ',\n                    SPLIT(nome_completo, '
            ')[SAFE_OFFSET(ARRAY_LENGTH(SPLIT(nome_completo, ' ')) - 1)]\n       \
            \         ),\n                nome_completo\n            )\n        )
            AS nome_sobrenome,\n        unidade_nome AS unidade_cras,\n        CONCAT(unidade_endereco,
            ' - ', unidade_bairro) AS endereco,\n        -- data_hora vem como STRING
            na tabela de origem, precisa de CAST explícito pra DATETIME\n        FORMAT_DATETIME('%d/%m/%Y',
            CAST(data_hora AS DATETIME)) AS data,\n        FORMAT_DATETIME('%H:%M',
            CAST(data_hora AS DATETIME)) AS hora\n    FROM `rj-crm-registry-dev.dev__dev_fantasma__brutos_data_metrica_staging.cadunico_agendamentos`\n\
            \    WHERE\n        DATE(CAST(data_hora AS DATETIME)) = DATE_ADD(CURRENT_DATE('America/Sao_Paulo'),
            INTERVAL CAST({days_ahead_placeholder} AS int64) DAY)\n),\n\nfiltra_disparados
            AS (\n    -- verifica se esse cpf já recebeu essa mesma mensagem (nome_hsm_placeholder)
            nos últimos x dias,\n    -- tanto via status_disparo quanto via telefone_disparado
            (tabela legada pré-migração,\n    -- por telefone; id_hsm 101 = HSM de
            confirmação de agendamento do CadÚnico)\n    SELECT segmentacao_original.*\n\
            \    FROM segmentacao_original\n    LEFT JOIN `rj-crm-registry.brutos_salesforce.status_disparo`
            sd\n        ON sd.cpf = segmentacao_original.cpf\n        AND sd.nome_hsm
            = '{nome_hsm_placeholder}'\n        AND sd.envio_datahora >= DATETIME_SUB(CURRENT_DATETIME('America/Sao_Paulo'),
            INTERVAL {intervalo_filtro_disparados} DAY)\n        AND sd.data_particao
            >= DATE_SUB(CURRENT_DATE(), INTERVAL {intervalo_filtro_disparados} DAY)\n\
            \        AND sd.indicador_quarentena = FALSE\n    LEFT JOIN `rj-crm-registry.crm_whatsapp.telefone_disparado`
            td\n        ON td.contato_telefone = segmentacao_original.celular_disparo\n\
            \        AND td.id_hsm = CAST({id_hsm_legado_placeholder} AS STRING)\n\
            \        AND td.data_particao >= DATE_SUB(CURRENT_DATE(), INTERVAL {intervalo_filtro_disparados}
            DAY)\n    WHERE sd.cpf IS NULL AND td.contato_telefone IS NULL\n),\n\n
            filtra_celulares_sem_whats AS (\n    -- remove telefones em quarentena
            ou com qualidade inválida\n    SELECT\n        DISTINCT s.*\n    FROM
            filtra_disparados AS s\n    LEFT JOIN `rj-crm-registry-dev.dev__dev_fantasma__intermediario_rmi_telefones.int_telefone`
            AS tel\n        ON s.celular_disparo = tel.telefone_numero_completo\n\
            \    LEFT JOIN UNNEST(tel.consentimento) AS c\n    WHERE\n        (c.indicador_quarentena
            = FALSE AND tel.telefone_qualidade != \"INVALIDO\")\n        OR tel.telefone_numero_completo
            IS NULL\n)\n\n-- Tabela simples (sem TO_JSON_STRING). 'externalId' é controle
            interno (dedup por\n-- CPF) e é descartado do CSV pelo de_columns antes
            do envio à Data Extension.\n-- telefone, SubscriberKey e LOCALE já são
            tratados por padrão pelo flow (LOCALE é\n-- preenchido automaticamente
            como 'BR' em save_csv_for_sftp).\nSELECT\n    celular_disparo AS telefone,\n\
            \    cpf AS SubscriberKey,\n    cpf AS externalId,\n    nome_sobrenome,\n\
            \    unidade_cras,\n    data,\n    hora,\n    endereco\nFROM filtra_celulares_sem_whats\n
            WHERE celular_disparo IS NOT NULL\n"
      - interval: 86400
        anchor_date: "2021-01-01T12:00:00"
        timezone: America/Sao_Paulo
        active: false
        slug: daily-smas-cartaopic-evento
        flow_run_name: smas-cartaopic-evento
        parameters:
          flow_environment: staging
          query_replacements: {"nome_hsm_placeholder": "smascartaoprimeirainfanciaprodv27",
            "intervalo_filtro_disparados": 150, "id_hsm_legado_placeholder": 184}
          campaign_name: smascartaoprimeirainfanciaprodv27
          data_extension_filename: whatsapp_smas_cartaopic_evento
          de_columns: ["nome_sobrenome", "endereco", "data", "horario"]
          dataset_id: brutos_salesforce
          table_id: disparos_efetuados
          dump_mode: append
          test_mode: true
          sleep_minutes: 5
          filter_dispatched_phones_or_cpfs:
          filter_duplicated_phones: false
          filter_duplicated_cpfs: false
          whitelist_percentage: 100
          infisical_secret_path: "/crm_disparo_template"
          whitelist_environment: "production"
          filter_failed_phones: false
          force_add_on_whitelist_group: true
          whitelist_replace_contacts: true
          query: "-- Gate de aprovação: só roda o ramo ELSE (que escaneia agendamentos_cadunico,\n
            -- pessoa_fisica e cartao_primeira_infancia_carioca_status) se alguém
            marcou o disparo\n-- de hoje como aprovado na planilha de bairros de entrega.
            Se ninguém aprovou (ou\n-- aprovou pra outro dia), target_date vem NULL,
            cai no IF e a query nem toca nas\n-- tabelas pesadas — o flow encerra
            sozinho em \"no destinations found\", sem check em Python.\nDECLARE target_date
            DATE DEFAULT (\n    SELECT DATE(DATA_ENTREGA)\n    FROM `rj-crm-registry-dev.dev__dev_fantasma__pic.raw_cartao_primeira_infancia_carioca_bairros_entrega`\n\
            \    WHERE\n        LOWER(TRIM(APROVACAO_DISPARO_AVISO)) = 'aprovado'\n\
            \        AND DATE(DATA_DISPARO_AVISO) = CURRENT_DATE('America/Sao_Paulo')\n\
            \        AND TIPO_ENTREGA != 'CRAS'\n    LIMIT 1\n);\n\nIF target_date
            IS NULL THEN\n    SELECT\n        CAST(NULL AS STRING) AS telefone,\n\
            \        CAST(NULL AS STRING) AS SubscriberKey,\n        CAST(NULL AS
            STRING) AS externalId,\n        CAST(NULL AS STRING) AS nome_sobrenome,\n\
            \        CAST(NULL AS STRING) AS endereco,\n        CAST(NULL AS STRING)
            AS data,\n        CAST(NULL AS STRING) AS horario\n    LIMIT 0;\nELSE\n\
            \    WITH\n    agendamentos_unicos AS (\n        SELECT\n            LPAD(cpf,
            11, '0') AS cpf,\n            telefone,\n            ROW_NUMBER() OVER
            (PARTITION BY cpf ORDER BY data_hora DESC) AS rn\n        FROM `rj-crm-registry-dev.dev__dev_fantasma__brutos_data_metrica_staging.cadunico_agendamentos`\n\
            \        WHERE cpf IS NOT NULL\n    ),\n\n    dados_rmi AS (\n       \
            \ SELECT\n            cpf,\n            telefone\n        FROM `rj-crm-registry-dev.dev__dev_fantasma__rmi_dados_mestres.pessoa_fisica`
            AS rmi\n        WHERE menor_idade IS FALSE AND obito.indicador IS FALSE\n\
            \    ),\n\n    telefone_principal_rmi AS (\n        SELECT\n         \
            \   cpf,\n            CONCAT(IFNULL(telefone.principal.ddi, \"55\"), telefone.principal.ddd,
            telefone.principal.valor) AS telefone_principal\n        FROM dados_rmi
            AS rmi\n        WHERE telefone.principal.estrategia_envio IN (\"ENVIAR\"\
            , \"TESTAR\")\n    ),\n\n    telefones_alternativos_rmi AS (\n       \
            \ SELECT\n            cpf,\n            CONCAT(IFNULL(tel_alt.ddi, \"\
            55\"), tel_alt.ddd, tel_alt.valor) AS telefone_alternativo,\n        \
            \    ROW_NUMBER() OVER (PARTITION BY cpf ORDER BY tel_alt.origem) AS rn\n\
            \        FROM dados_rmi AS rmi, UNNEST(rmi.telefone.alternativo) AS tel_alt\n\
            \        WHERE tel_alt.valor IS NOT NULL\n    ),\n\n    joined_status_cpi
            AS (\n        SELECT\n            TRIM(t1.NOME_RESPONSAVEL) AS nome_completo,\n\
            \            LPAD(CAST(t1.NUM_CPF_RESPONSAVEL AS STRING), 11, '0') AS
            cpf,\n            SAFE.PARSE_DATE('%Y-%m-%d', TRIM(CAST(t1.DATA_ENTREGA_PREVISTA
            AS STRING))) AS data_evento_date,\n            TRIM(\n               \
            \ CONCAT(\n                    t1.LOCAL_ENTREGA_PREVISTO,\n          \
            \          IF(\n                        t1.ENDERECO_ENTREGA_PREVISTO IS
            NOT NULL AND t1.ENDERECO_ENTREGA_PREVISTO != '',\n                   \
            \     CONCAT(' (', t1.ENDERECO_ENTREGA_PREVISTO, ')'),\n             \
            \           ''\n                    )\n                )\n           \
            \ ) AS endereco_evento,\n            t1.HORA_ENTREGA_PREVISTA AS horario_evento,\n\
            \            COALESCE(\n                `rj-crm-registry.udf.VALIDATE_AND_FORMAT_CELLPHONE`(t1.NUM_TEL_CONTATO_1_FAM),\n\
            \                `rj-crm-registry.udf.VALIDATE_AND_FORMAT_CELLPHONE`(t1.NUM_TEL_CONTATO_2_FAM),\n\
            \                `rj-crm-registry.udf.VALIDATE_AND_FORMAT_CELLPHONE`(a.telefone),\n\
            \                `rj-crm-registry.udf.VALIDATE_AND_FORMAT_CELLPHONE`(rmi.telefone_principal),\n\
            \                `rj-crm-registry.udf.VALIDATE_AND_FORMAT_CELLPHONE`(tel_alt.telefone_alternativo)\n\
            \            ) AS celular_disparo\n        FROM `rj-crm-registry-dev.dev__dev_fantasma__pic.cartao_primeira_infancia_carioca_status`
            AS t1\n        LEFT JOIN agendamentos_unicos AS a\n            ON LPAD(CAST(t1.NUM_CPF_RESPONSAVEL
            AS STRING), 11, '0') = a.cpf AND a.rn = 1\n        LEFT JOIN telefone_principal_rmi
            AS rmi\n            ON LPAD(CAST(t1.NUM_CPF_RESPONSAVEL AS STRING), 11,
            '0') = rmi.cpf\n        LEFT JOIN telefones_alternativos_rmi AS tel_alt\n\
            \            ON LPAD(CAST(t1.NUM_CPF_RESPONSAVEL AS STRING), 11, '0')
            = tel_alt.cpf AND tel_alt.rn = 1\n        WHERE\n            SAFE.PARSE_DATE('%Y-%m-%d',
            TRIM(CAST(t1.DATA_ENTREGA_PREVISTA AS STRING))) = target_date\n      \
            \      AND STATUS != 'não retirado'\n            AND TIPO_ENTREGA_PREVISTA
            != 'CRAS'\n    ),\n\n    filtra_disparados AS (\n        -- verifica se
            esse cpf já recebeu essa mesma mensagem (nome_hsm_placeholder) nos últimos
            x dias,\n        -- tanto via status_disparo quanto via wetalkie (histórico
            legado pré-migração;\n        -- templateId 184 = HSM de evento do PIC)\n\
            \        SELECT joined_status_cpi.*\n        FROM joined_status_cpi\n\
            \        LEFT JOIN `rj-crm-registry.brutos_salesforce.status_disparo`
            sd\n            ON sd.cpf = joined_status_cpi.cpf\n            AND sd.nome_hsm
            = '{nome_hsm_placeholder}'\n            AND sd.envio_datahora >= DATETIME_SUB(CURRENT_DATETIME('America/Sao_Paulo'),
            INTERVAL {intervalo_filtro_disparados} DAY)\n            AND sd.data_particao
            >= DATE_SUB(CURRENT_DATE(), INTERVAL {intervalo_filtro_disparados} DAY)\n\
            \            AND sd.indicador_quarentena = FALSE\n        LEFT JOIN `rj-crm-registry.brutos_wetalkie_staging.fluxo_atendimento_*`
            fl\n            ON fl.flattarget = joined_status_cpi.celular_disparo\n\
            \            AND fl.templateId = {id_hsm_legado_placeholder}\n       \
            \ WHERE sd.cpf IS NULL AND fl.flattarget IS NULL\n    ),\n\n    filtra_celulares_sem_whats
            AS (\n        -- remove telefones em quarentena ou com qualidade inválida\n\
            \        SELECT DISTINCT f.*\n        FROM filtra_disparados AS f\n  \
            \      LEFT JOIN `rj-crm-registry-dev.dev__dev_fantasma__intermediario_rmi_telefones.int_telefone`
            AS tel\n            ON f.celular_disparo = tel.telefone_numero_completo\n\
            \        LEFT JOIN UNNEST(tel.consentimento) AS c\n        WHERE\n   \
            \         (c.indicador_quarentena = FALSE AND tel.telefone_qualidade !=
            \"INVALIDO\")\n            OR tel.telefone_numero_completo IS NULL\n \
            \   ),\n\n    formatted AS (\n        SELECT\n            celular_disparo,\n\
            \            INITCAP(\n                IF(\n                    ARRAY_LENGTH(SPLIT(nome_completo,
            ' ')) > 1,\n                    CONCAT(\n                        SPLIT(nome_completo,
            ' ')[SAFE_OFFSET(0)],\n                        ' ',\n                \
            \        SPLIT(nome_completo, ' ')[SAFE_OFFSET(ARRAY_LENGTH(SPLIT(nome_completo,
            ' ')) - 1)]\n                    ),\n                    nome_completo\n\
            \                )\n            ) AS nome_sobrenome,\n            cpf,\n\
            \            endereco_evento,\n            FORMAT_DATE('%d/%m/%Y', data_evento_date)
            AS data_formatada,\n            horario_evento\n        FROM filtra_celulares_sem_whats\n\
            \        WHERE celular_disparo IS NOT NULL AND data_evento_date IS NOT
            NULL\n    )\n\n    -- Tabela simples (sem TO_JSON_STRING). 'externalId'
            é controle interno (dedup por\n    -- CPF) e é descartado do CSV pelo
            de_columns antes do envio à Data Extension.\n    -- telefone, SubscriberKey
            e LOCALE já são tratados por padrão pelo flow (LOCALE é\n    -- preenchido
            automaticamente como 'BR' em save_csv_for_sftp).\n    SELECT\n       \
            \ celular_disparo AS telefone,\n        cpf AS SubscriberKey,\n      \
            \  cpf AS externalId,\n        nome_sobrenome,\n        endereco_evento
            AS endereco,\n        data_formatada AS data,\n        horario_evento
            AS horario\n    FROM formatted\n    WHERE celular_disparo IS NOT NULL;\n
            END IF;\n"
      - interval: 86400
        anchor_date: "2021-01-01T12:00:00"
        timezone: America/Sao_Paulo
        active: false
        slug: daily-smas-cartaopic-lembrete
        flow_run_name: smas-cartaopic-lembrete
        parameters:
          flow_environment: staging
          query_replacements: {"nome_hsm_placeholder": "smascartaoprimeirainfancialembreteprodv4",
            "intervalo_filtro_disparados": 150, "id_hsm_legado_placeholder": 185}
          campaign_name: smascartaoprimeirainfancialembreteprodv4
          data_extension_filename: whatsapp_smas_cartaopic_lembrete
          de_columns: ["nome_sobrenome", "endereco", "data", "horario"]
          dataset_id: brutos_salesforce
          table_id: disparos_efetuados
          dump_mode: append
          test_mode: true
          sleep_minutes: 5
          filter_dispatched_phones_or_cpfs:
          filter_duplicated_phones: false
          filter_duplicated_cpfs: false
          whitelist_percentage: 0
          infisical_secret_path: "/crm_disparo_template"
          whitelist_environment: "production"
          query: "-- Gate de aprovação: só roda o ramo ELSE (que escaneia agendamentos_cadunico,\n
            -- pessoa_fisica e cartao_primeira_infancia_carioca_status) se alguém
            marcou o disparo\n-- de hoje como aprovado na planilha de bairros de entrega.
            Se ninguém aprovou (ou\n-- aprovou pra outro dia), target_date vem NULL,
            cai no IF e a query nem toca nas\n-- tabelas pesadas — o flow encerra
            sozinho em \"no destinations found\", sem check em Python.\nDECLARE target_date
            DATE DEFAULT (\n    SELECT DATE(DATA_ENTREGA)\n    FROM `rj-crm-registry-dev.dev__dev_fantasma__pic.raw_cartao_primeira_infancia_carioca_bairros_entrega`\n\
            \    WHERE\n        LOWER(TRIM(APROVACAO_DISPARO_LEMBRETE)) = 'aprovado'\n\
            \        AND DATE(DATA_DISPARO_LEMBRETE) = CURRENT_DATE('America/Sao_Paulo')\n\
            \        AND TIPO_ENTREGA != 'CRAS'\n    LIMIT 1\n);\n\nIF target_date
            IS NULL THEN\n    SELECT\n        CAST(NULL AS STRING) AS telefone,\n\
            \        CAST(NULL AS STRING) AS SubscriberKey,\n        CAST(NULL AS
            STRING) AS externalId,\n        CAST(NULL AS STRING) AS nome_sobrenome,\n\
            \        CAST(NULL AS STRING) AS endereco,\n        CAST(NULL AS STRING)
            AS data,\n        CAST(NULL AS STRING) AS horario\n    LIMIT 0;\nELSE\n\
            \    WITH\n    agendamentos_unicos AS (\n        SELECT\n            LPAD(cpf,
            11, '0') AS cpf,\n            telefone,\n            ROW_NUMBER() OVER
            (PARTITION BY cpf ORDER BY data_hora DESC) AS rn\n        FROM `rj-crm-registry-dev.dev__dev_fantasma__brutos_data_metrica_staging.cadunico_agendamentos`\n\
            \        WHERE cpf IS NOT NULL\n    ),\n\n    dados_rmi AS (\n       \
            \ SELECT\n            cpf,\n            telefone\n        FROM `rj-crm-registry-dev.dev__dev_fantasma__rmi_dados_mestres.pessoa_fisica`
            AS rmi\n        WHERE menor_idade IS FALSE AND obito.indicador IS FALSE\n\
            \    ),\n\n    telefone_principal_rmi AS (\n        SELECT\n         \
            \   cpf,\n            CONCAT(IFNULL(telefone.principal.ddi, \"55\"), telefone.principal.ddd,
            telefone.principal.valor) AS telefone_principal\n        FROM dados_rmi
            AS rmi\n        WHERE telefone.principal.estrategia_envio IN (\"ENVIAR\"\
            , \"TESTAR\")\n    ),\n\n    telefones_alternativos_rmi AS (\n       \
            \ SELECT\n            cpf,\n            CONCAT(IFNULL(tel_alt.ddi, \"\
            55\"), tel_alt.ddd, tel_alt.valor) AS telefone_alternativo,\n        \
            \    ROW_NUMBER() OVER (PARTITION BY cpf ORDER BY tel_alt.origem) AS rn\n\
            \        FROM dados_rmi AS rmi, UNNEST(rmi.telefone.alternativo) AS tel_alt\n\
            \        WHERE tel_alt.valor IS NOT NULL\n    ),\n\n    joined_status_cpi
            AS (\n        SELECT\n            TRIM(t1.NOME_RESPONSAVEL) AS nome_completo,\n\
            \            LPAD(CAST(t1.NUM_CPF_RESPONSAVEL AS STRING), 11, '0') AS
            cpf,\n            SAFE.PARSE_DATE('%Y-%m-%d', TRIM(CAST(t1.DATA_ENTREGA_PREVISTA
            AS STRING))) AS data_evento_date,\n            TRIM(\n               \
            \ CONCAT(\n                    t1.LOCAL_ENTREGA_PREVISTO,\n          \
            \          IF(\n                        t1.ENDERECO_ENTREGA_PREVISTO IS
            NOT NULL AND t1.ENDERECO_ENTREGA_PREVISTO != '',\n                   \
            \     CONCAT(' (', t1.ENDERECO_ENTREGA_PREVISTO, ')'),\n             \
            \           ''\n                    )\n                )\n           \
            \ ) AS endereco_evento,\n            t1.HORA_ENTREGA_PREVISTA AS horario_evento,\n\
            \            COALESCE(\n                `rj-crm-registry.udf.VALIDATE_AND_FORMAT_CELLPHONE`(t1.NUM_TEL_CONTATO_1_FAM),\n\
            \                `rj-crm-registry.udf.VALIDATE_AND_FORMAT_CELLPHONE`(t1.NUM_TEL_CONTATO_2_FAM),\n\
            \                `rj-crm-registry.udf.VALIDATE_AND_FORMAT_CELLPHONE`(a.telefone),\n\
            \                `rj-crm-registry.udf.VALIDATE_AND_FORMAT_CELLPHONE`(rmi.telefone_principal),\n\
            \                `rj-crm-registry.udf.VALIDATE_AND_FORMAT_CELLPHONE`(tel_alt.telefone_alternativo)\n\
            \            ) AS celular_disparo\n        FROM `rj-crm-registry-dev.dev__dev_fantasma__pic.cartao_primeira_infancia_carioca_status`
            AS t1\n        LEFT JOIN agendamentos_unicos AS a\n            ON LPAD(CAST(t1.NUM_CPF_RESPONSAVEL
            AS STRING), 11, '0') = a.cpf AND a.rn = 1\n        LEFT JOIN telefone_principal_rmi
            AS rmi\n            ON LPAD(CAST(t1.NUM_CPF_RESPONSAVEL AS STRING), 11,
            '0') = rmi.cpf\n        LEFT JOIN telefones_alternativos_rmi AS tel_alt\n\
            \            ON LPAD(CAST(t1.NUM_CPF_RESPONSAVEL AS STRING), 11, '0')
            = tel_alt.cpf AND tel_alt.rn = 1\n        WHERE\n            SAFE.PARSE_DATE('%Y-%m-%d',
            TRIM(CAST(t1.DATA_ENTREGA_PREVISTA AS STRING))) = target_date\n      \
            \      AND STATUS != 'não retirado'\n            AND TIPO_ENTREGA_PREVISTA
            != 'CRAS'\n    ),\n\n    filtra_disparados AS (\n        -- verifica se
            esse cpf já recebeu essa mesma mensagem (nome_hsm_placeholder) nos últimos
            x dias,\n        -- tanto via status_disparo quanto via wetalkie (histórico
            legado pré-migração;\n        -- templateId 185 = HSM de lembrete do PIC)\n\
            \        SELECT joined_status_cpi.*\n        FROM joined_status_cpi\n\
            \        LEFT JOIN `rj-crm-registry.brutos_salesforce.status_disparo`
            sd\n            ON sd.cpf = joined_status_cpi.cpf\n            AND sd.nome_hsm
            = '{nome_hsm_placeholder}'\n            AND sd.envio_datahora >= DATETIME_SUB(CURRENT_DATETIME('America/Sao_Paulo'),
            INTERVAL {intervalo_filtro_disparados} DAY)\n            AND sd.data_particao
            >= DATE_SUB(CURRENT_DATE(), INTERVAL {intervalo_filtro_disparados} DAY)\n\
            \            AND sd.indicador_quarentena = FALSE\n        LEFT JOIN `rj-crm-registry.brutos_wetalkie_staging.fluxo_atendimento_*`
            fl\n            ON fl.flattarget = joined_status_cpi.celular_disparo\n\
            \            AND fl.templateId = {id_hsm_legado_placeholder}\n       \
            \ WHERE sd.cpf IS NULL AND fl.flattarget IS NULL\n    ),\n\n    filtra_celulares_sem_whats
            AS (\n        -- remove telefones em quarentena ou com qualidade inválida\n\
            \        SELECT DISTINCT f.*\n        FROM filtra_disparados AS f\n  \
            \      LEFT JOIN `rj-crm-registry-dev.dev__dev_fantasma__intermediario_rmi_telefones.int_telefone`
            AS tel\n            ON f.celular_disparo = tel.telefone_numero_completo\n\
            \        LEFT JOIN UNNEST(tel.consentimento) AS c\n        WHERE\n   \
            \         (c.indicador_quarentena = FALSE AND tel.telefone_qualidade !=
            \"INVALIDO\")\n            OR tel.telefone_numero_completo IS NULL\n \
            \   ),\n\n    formatted AS (\n        SELECT\n            celular_disparo,\n\
            \            INITCAP(\n                IF(\n                    ARRAY_LENGTH(SPLIT(nome_completo,
            ' ')) > 1,\n                    CONCAT(\n                        SPLIT(nome_completo,
            ' ')[SAFE_OFFSET(0)],\n                        ' ',\n                \
            \        SPLIT(nome_completo, ' ')[SAFE_OFFSET(ARRAY_LENGTH(SPLIT(nome_completo,
            ' ')) - 1)]\n                    ),\n                    nome_completo\n\
            \                )\n            ) AS nome_sobrenome,\n            cpf,\n\
            \            endereco_evento,\n            FORMAT_DATE('%d/%m/%Y', data_evento_date)
            AS data_formatada,\n            horario_evento\n        FROM filtra_celulares_sem_whats\n\
            \        WHERE celular_disparo IS NOT NULL AND data_evento_date IS NOT
            NULL\n    )\n\n    -- Tabela simples (sem TO_JSON_STRING). 'externalId'
            é controle interno (dedup por\n    -- CPF) e é descartado do CSV pelo
            de_columns antes do envio à Data Extension.\n    -- telefone, SubscriberKey
            e LOCALE já são tratados por padrão pelo flow (LOCALE é\n    -- preenchido
            automaticamente como 'BR' em save_csv_for_sftp).\n    SELECT\n       \
            \ celular_disparo AS telefone,\n        cpf AS SubscriberKey,\n      \
            \  cpf AS externalId,\n        nome_sobrenome,\n        endereco_evento
            AS endereco,\n        data_formatada AS data,\n        horario_evento
            AS horario\n    FROM formatted\n    WHERE celular_disparo IS NOT NULL;\n
            END IF;\n"
  - name: rj-crm--disparo-template-sf--prod
    version: '{{ get-commit-hash.stdout }}'
    entrypoint: pipelines/rj_crm__disparo_template/flow.py:rj_crm__disparo_template_sf
    work_pool:
      name: default-pool
      work_queue_name: default
      job_variables:
        image: '{{ build-image.image_name }}:{{ build-image.tag }}'
        command: "uv run --package rj_crm__disparo_template -- prefect flow-run execute"
        secretName: prefect-jobs-crm-registry-secrets
        image_pull_policy: Always
    parameters:
      campaign_name: disparo-template-sf
      dataset_id: brutos_wetalkie
      table_id: disparos_efetuados_sf
      dump_mode: append
      filter_dispatched_phones_or_cpfs: cpf
      filter_duplicated_phones: false
      filter_duplicated_cpfs: true
      infisical_secret_path: /crm_disparo_template

