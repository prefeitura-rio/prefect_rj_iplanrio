name: rj_crm__disparo_template
prefect-version: 3.4.3
build:
  - prefect.deployments.steps.run_shell_script:
      id: get-commit-hash
      script: git rev-parse --short HEAD
      stream_output: false
  - prefect_docker.deployments.steps.build_docker_image:
      id: build-image
      requires: prefect-docker>=0.6.5
      image_name: ghcr.io/prefeitura-rio/prefect_rj_iplanrio/deployments
      tag: rj_crm__disparo_template-{{ get-commit-hash.stdout }}
      dockerfile: pipelines/rj_crm__disparo_template/Dockerfile
push:
  - prefect_docker.deployments.steps.push_docker_image:
      requires: prefect-docker>=0.6.5
      image_name: '{{ build-image.image_name }}'
      tag: '{{ build-image.tag }}'
pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /opt/prefect/prefect_rj_iplanrio
deployments:

  - name: rj-crm--disparo-template-sf--staging
    version: '{{ build-image.tag }}'
    entrypoint: 
      pipelines/rj_crm__disparo_template/flow.py:rj_crm__disparo_template_sf
    work_pool:
      name: default-pool
      work_queue_name: default
      job_variables:
        image: '{{ build-image.image_name }}:{{ build-image.tag }}'
        command: "uv run --package rj_crm__disparo_template -- prefect flow-run execute"
        secretName: prefect-jobs-crm-registry-secrets-staging
        image_pull_policy: Always
    parameters:
      campaign_name: disparo-template-sf
      dataset_id: brutos_wetalkie
      table_id: disparos_efetuados_sf
      dump_mode: append
      filter_dispatched_phones_or_cpfs: cpf
      filter_duplicated_phones: false
      filter_duplicated_cpfs: true
      infisical_secret_path: /crm_disparo_template
    schedules:
# Schedule para testar flow na salesforce
      - interval: 86400
        anchor_date: "2021-01-01T19:00:00"
        timezone: America/Sao_Paulo
        active: false
        slug: daily-cvl-1746-survey-invitation-without-resolution
        flow_run_name: cvl-pesquisa1746
        parameters:
          flow_environment: staging
          query_replacements: {"id_hsm_placeholder": 291}
          campaign_name: cvl_pesquisa_1746_sem_resolucao_prod_v1
          dataset_id: brutos_salesforce
          table_id: disparos_efetuados
          dump_mode: append
          test_mode: true
          sleep_minutes: 5
          whitelist_percentage: 0
          infisical_secret_path: "/crm_disparo_template"
          whitelist_environment: "production"
          filter_duplicated_phones: true
          filter_duplicated_cpfs: true
          query: "-- Query de teste para CVL Pesquisa 1746 Sem Resolução\nSELECT \n\
            \    \"5511984677798\" AS telefone,\n    \"12345678901\" AS SubscriberKey,\n\
            \    \"Usuario Teste Sem Resolucao\" AS nome_sobrenome,\n    \"Varrição
            de logradouro\" AS solicitacao,\n    \"Central 1746\" AS canal\nUNION
            ALL\nSELECT \n    \"5521989190512\" AS telefone,\n    \"98765432100\"\
            \ AS SubscriberKey,\n    \"Outro Teste Sem Resolucao\" AS nome_sobrenome,\n\
            \    \"Reparo de buraco na pista\" AS solicitacao,\n    \"Aplicativo 1746\"\
            \ AS canal\n"
      - interval: 86400
        anchor_date: "2021-01-01T19:00:00"
        timezone: America/Sao_Paulo
        active: false
        slug: daily-cvl-pesquisa1746-prod
        flow_run_name: cvl-pesquisa1746
        parameters:
          flow_environment: staging
          query_replacements: {"id_hsm_placeholder": 192}
          campaign_name: cvl_pesquisa_1746_prod_v1
          dataset_id: brutos_salesforce
          table_id: disparos_efetuados
          dump_mode: append
          test_mode: true
          sleep_minutes: 5
          whitelist_percentage: 0
          infisical_secret_path: "/crm_disparo_template"
          whitelist_environment: "production"
          filter_duplicated_phones: true
          filter_duplicated_cpfs: true
          query: "-- Query de teste para CVL Pesquisa 1746 Com Solução\nSELECT \n\
            \    \"5511984677798\" AS telefone,\n    \"000000000001\" AS SubscriberKey,\n\
            \    \"Usuario Teste Com Solucao\" AS nome_sobrenome,\n    \"Poda de árvore
            em logradouro\" AS solicitacao,\n    \"Central 1746\" AS canal\nUNION
            ALL\nSELECT \n    \"5521989190512\" AS telefone,\n    \"000000000002\"\
            \ AS SubscriberKey,\n    \"5521988888888\" as celular_disparo,\n    \"\
            Maria\" as nome_sobrenome,\n    \"Dívida Ativa\" as servico,\n    \"Obrigado
            por regularizar!\" as mensagem,\n    \"Outro Teste Com Solucao\" AS nome,\n\
            \    \"Reparo de Luminária\" AS solicitacao,\n    \"Aplicativo 1746\"\
            \ AS canal\n"
      - interval: 86400
        anchor_date: "2021-01-01T13:00:00"
        timezone: America/Sao_Paulo
        active: false
        slug: daily-pgm-divida-ativa-prod
        flow_run_name: pgm-divida-ativa
        parameters:
          flow_environment: staging
          query_replacements: {"id_hsm_placeholder": 239, "limit_placeholder": 
              300}
