            BY envio_datahora DESC\n    ) = 1\n),\nfiltra_falhas AS (\n    SELECT\n\
            \        distinct\n        s.* EXCEPT(celular_disparo_1, celular_disparo_2,
            celular_disparo_3, celular_disparo_rmi),\n\n        IF(f1.falhou, NULL,
            s.celular_disparo_1) AS celular_disparo_1,\n        IF(f2.falhou, NULL,
            s.celular_disparo_2) AS celular_disparo_2,\n        IF(f3.falhou, NULL,
            s.celular_disparo_3) AS celular_disparo_3,\n        IF(f4.falhou, NULL,
            s.celular_disparo_rmi) AS celular_disparo_rmi,\n\n        COALESCE(\n\
            \        IF(f1.falhou, NULL, s.celular_disparo_1),\n        IF(f2.falhou,
            NULL, s.celular_disparo_2),\n        IF(f3.falhou, NULL, s.celular_disparo_3),\n\
            \        IF(f4.falhou, NULL, s.celular_disparo_rmi)\n        ) AS celular_disparo\n\
            \n    FROM enriquece_rmi s\n    LEFT JOIN status_final_telefone f1\n \
            \       ON f1.flatTarget = s.celular_disparo_1\n\n    LEFT JOIN status_final_telefone
            f2\n        ON f2.flatTarget = s.celular_disparo_2\n\n    LEFT JOIN status_final_telefone
            f3\n        ON f3.flatTarget = s.celular_disparo_3\n\n    LEFT JOIN status_final_telefone
            f4\n        ON f4.flatTarget = s.celular_disparo_rmi\n),\nfiltra_recebeu_primeira_hsm
            as (\n    -- verifica se esse cpf recebeu a primeira mensagem (D0, nome_hsm_anterior_placeholder)
            nos últimos 50 dias\n    select distinct filtra_falhas.*\n    FROM filtra_falhas\n\
            \    left join `rj-crm-registry.brutos_salesforce.status_disparo` sd\n\
            \            on sd.cpf = filtra_falhas.cpf\n            and sd.nome_hsm
            = '{nome_hsm_anterior_placeholder}'\n            and sd.envio_datahora
            >= DATETIME_SUB(CURRENT_DATETIME('America/Sao_Paulo'), INTERVAL 50 DAY)\n\
            \            and sd.data_particao >= DATE_SUB(CURRENT_DATE(), INTERVAL
            51 DAY)\n        where sd.cpf is not null\n),\nfiltra_disparados as (\n\
            \    -- verifica se esse cpf já recebeu essa mesma mensagem (nome_hsm_placeholder)
            nos últimos x dias\n    select filtra_recebeu_primeira_hsm.*\n    FROM
            filtra_recebeu_primeira_hsm\n    left join `rj-crm-registry.brutos_salesforce.status_disparo`
            sd\n            on sd.cpf = filtra_recebeu_primeira_hsm.cpf\n        \
            \    and sd.nome_hsm = '{nome_hsm_placeholder}'\n            and sd.envio_datahora
            >= DATETIME_SUB(CURRENT_DATETIME('America/Sao_Paulo'), INTERVAL {intervalo_filtro_disparados}
            DAY)\n            and sd.data_particao >= DATE_SUB(CURRENT_DATE(), INTERVAL
            {intervalo_filtro_disparados} DAY)\n            and sd.indicador_falha
            = FALSE\n        where sd.cpf is null\n),\nfinal as (\n    select filtra_disparados.*\n\
            \    from filtra_disparados\n)\n-- Tabela simples (sem TO_JSON_STRING).
            'externalId' (dedup por CPF) e 'others'\n-- (retentativas) são controle
            interno; o de_columns de cada schedule decide quais\n-- colunas (ex.:
            nome) realmente vão pra Data Extension.\nSELECT\n    celular_disparo AS
            telefone,\n    CAST(cpf AS STRING) AS SubscriberKey,\n    CAST(cpf AS
            STRING) AS externalId,\n    INITCAP(\n        IF(\n            ARRAY_LENGTH(SPLIT(nome,
            ' ')) > 1,\n            CONCAT(SPLIT(nome, ' ')[SAFE_OFFSET(0)], ' '),\n\
            \            nome\n        )\n    ) AS nome,\n    ARRAY(SELECT x FROM
            UNNEST([celular_disparo_2, celular_disparo_3]) AS x WHERE x IS NOT NULL
            AND x != celular_disparo) AS others\nfrom final\nwhere celular_disparo
            is not null\n"
