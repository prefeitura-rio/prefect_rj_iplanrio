            \    where nome_hsm in (\n        '{nome_hsm_cobranca_placeholder}',\n\
            \        '{nome_hsm_lembrete_placeholder}',\n        '{nome_hsm_agradecimento_placeholder}'\n\
            \    )\n\n    UNION ALL\n\n    -- Legado: histórico via Wetalkie antes
