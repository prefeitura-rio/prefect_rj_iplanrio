name: rj_crm__disparo_template
prefect-version: 3.4.3
build:
  - prefect.deployments.steps.run_shell_script:
      id: get-commit-hash
      script: git rev-parse --short HEAD
      stream_output: false
  - prefect_docker.deployments.steps.build_docker_image:
      id: build-image
      requires: prefect-docker>=0.6.5
      image_name: ghcr.io/prefeitura-rio/prefect_rj_iplanrio/deployments
      tag: rj_crm__disparo_template-{{ get-commit-hash.stdout }}
      dockerfile: pipelines/rj_crm__disparo_template/Dockerfile
push:
  - prefect_docker.deployments.steps.push_docker_image:
      requires: prefect-docker>=0.6.5
      image_name: '{{ build-image.image_name }}'
      tag: '{{ build-image.tag }}'
pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /opt/prefect/prefect_rj_iplanrio
deployments:

  - name: rj-crm--disparo-template-sf--staging
    version: '{{ build-image.tag }}'
    entrypoint: pipelines/rj_crm__disparo_template/flow.py:rj_crm__disparo_template_sf
    work_pool:
      name: default-pool
      work_queue_name: default
      job_variables:
        image: '{{ build-image.image_name }}:{{ build-image.tag }}'
        command: "uv run --package rj_crm__disparo_template -- prefect flow-run execute"
        secretName: prefect-jobs-crm-registry-secrets-staging
        image_pull_policy: Always
    parameters:
      campaign_name: disparo-template-sf
      dataset_id: brutos_wetalkie
      table_id: disparos_efetuados_sf
      dump_mode: append
      filter_dispatched_phones_or_cpfs: cpf
      filter_duplicated_phones: false
      filter_duplicated_cpfs: true
      infisical_secret_path: /crm_disparo_template
    schedules:
# Schedule para testar flow na salesforce
      - interval: 86400
        anchor_date: "2021-01-01T19:00:00"
        timezone: America/Sao_Paulo
        active: false
        slug: daily-cvl-pesquisa1746-unificado
        flow_run_name: cvl-pesquisa1746
        parameters:
          flow_environment: staging
          query_replacements: {"id_hsm_com_solucao_placeholder": 192, "nome_hsm_com_solucao_placeholder": "cvl_pesquisa_1746_prod_v1",
            "id_hsm_sem_resolucao_placeholder": 291, "nome_hsm_sem_resolucao_placeholder": "cvl_pesquisa_1746_sem_resolucao_prod_v1"}
          campaign_name: cvl_pesquisa_1746_unificado_v1
          data_extension_filename: whatsapp_cvl_pesquisa_1746
          de_columns: ["cc_wt_nome_sobrenome", "cc_wt_solicitacao", "cc_wt_canal",
            "protocolo", "STATUS_DEMANDA", "cpfCnpj", "NOME_ARQUIVO"]
          csv_separator: ","
          dataset_id: brutos_salesforce
          table_id: disparos_efetuados
          dump_mode: append
          test_mode: false
          sleep_minutes: 5
          whitelist_percentage: 0
          infisical_secret_path: "/crm_disparo_template"
          whitelist_environment: "production"
          filter_duplicated_phones: true
          filter_duplicated_cpfs: true
          query: "-- Query unificada: pesquisa de satisfação CVL 1746 (fechado com
            solução + sem resolução).\n-- Cada chamado só cai em um dos dois desfechos,
            e status_demanda_tratado carrega qual foi\n-- pra escolher, por linha,
            o par id_hsm/nome_hsm certo nos LEFT JOINs de dedup abaixo.\nWITH tabela_global
            AS (\n    SELECT\n        DISTINCT\n        -- Identificação do chamado
            e protocolo\n        t1.id_chamado,\n        t3.id_protocolo,\n      \
            \  t3.id_protocolo_chamado,\n        t3.numero_protocolo,\n        t3.ic_motivo,\n\
            \n        -- Descrição e canal de origem\n        t1.descricao AS descricao_chamado,\n\
            \        t5.no_origem_ocorrencia AS canal_atendimento,\n        CASE\n\
            \        WHEN t1.id_origem_ocorrencia = '1' THEN 'Central 1746'\n    \
            \    WHEN t1.id_origem_ocorrencia = '11' THEN 'Aplicativo 1746'\n    \
            \    WHEN t1.id_origem_ocorrencia = '12' THEN 'Agência 1746'\n       \
            \ WHEN t1.id_origem_ocorrencia = '13' THEN 'Site 1746'\n        WHEN t1.id_origem_ocorrencia
            = '16' THEN 'Carioca Digital'\n        WHEN t1.id_origem_ocorrencia =
            '17' THEN 'WhatsApp 1746'\n        WHEN t1.id_origem_ocorrencia = '18'
            THEN 'Van 1746'\n        WHEN t1.id_origem_ocorrencia = '26' THEN 'Agência
            1746'\n        WHEN t1.id_origem_ocorrencia = '28' THEN 'WhatsApp 1746'\n\
            \        ELSE t1.id_origem_ocorrencia\n        END AS canal_tratado,\n\
            \n        -- Dados do cidadão\n        t3.cpf,\n        t4.id_pessoa,\n\
            \        t4.nome,\n        CONCAT(\n        INITCAP(SPLIT(t4.nome, ' ')[OFFSET(0)]),\n\
            \        ' ',\n        INITCAP(SPLIT(t4.nome, ' ')[OFFSET(ARRAY_LENGTH(SPLIT(t4.nome,
            ' ')) - 1)])\n        ) AS nome_tratado,\n        t4.email,\n\n      \
            \  -- Telefones limpos e formatados\n        COALESCE(\n        `rj-crm-registry.udf.VALIDATE_AND_FORMAT_CELLPHONE`(REGEXP_REPLACE(t4.telefone_1,
            r'[^\\d]', '')),\n        `rj-crm-registry.udf.VALIDATE_AND_FORMAT_CELLPHONE`(REGEXP_REPLACE(t4.telefone_2,
            r'[^\\d]', '')),\n        `rj-crm-registry.udf.VALIDATE_AND_FORMAT_CELLPHONE`(REGEXP_REPLACE(t4.telefone_3,
            r'[^\\d]', ''))\n        ) AS telefone,\n\n        -- Datas e informações
            operacionais\n        t1.data_inicio,\n        t1.data_fim,\n        t1.data_alvo_finalizacao,\n\
            \        t1.categoria,\n        t1.id_tipo,\n        t1.tipo,\n      \
            \  t1.id_subtipo,\n\n        -- Subtipo tratado (descrição legível)\n\
            \        CASE\n        WHEN t1.id_subtipo = '1274' THEN 'Verificação de
            frequência irregular da coleta domiciliar'\n        WHEN t1.id_subtipo
            = '1242' THEN 'Verificação de ar condicionado inoperante no ônibus'\n\
            \        WHEN t1.id_subtipo = '1287' THEN 'Varrição de logradouro'\n \
            \       WHEN t1.id_subtipo = '2178' THEN 'Reposição de tampão ou grelha'\n\
            \        WHEN t1.id_subtipo = '3139' THEN 'Reparo de sinal de trânsito
            apagado'\n        WHEN t1.id_subtipo = '5799' THEN 'Reparo de Luminária'\n\
            \        WHEN t1.id_subtipo = '78' THEN 'Reparo de buraco na pista'\n\
            \        WHEN t1.id_subtipo = '1298' THEN 'Remoção de resíduos no logradouro'\n\
            \        WHEN t1.id_subtipo = '1325' THEN 'Remoção de entulho e bens inservíveis'\n\
            \        WHEN t1.id_subtipo = '1319' THEN 'Poda de árvore em logradouro'\n\
            \        WHEN t1.id_subtipo = '5071' THEN 'Fiscalização de perturbação
            do sossego'\n        WHEN t1.id_subtipo = '114' THEN 'Fiscalização de
            obstáculo fixo na calçada'\n        WHEN t1.id_subtipo = '2966' THEN 'Fiscalização
            de estacionamento irregular de veículo'\n        WHEN t1.id_subtipo =
            '1101' THEN 'Fiscalização de comércio ambulante'\n        WHEN t1.id_subtipo
            = '5841' THEN 'Fiscalização da ocupação de área pública'\n        WHEN
            t1.id_subtipo = '100' THEN 'Desobstrução de ramais e ralos'\n        WHEN
            t1.id_subtipo = '1316' THEN 'Controle de roedores e caramujos africanos'\n\
            \        WHEN t1.id_subtipo = '1279' THEN 'Capina em logradouro'\n   \
            \     WHEN t1.id_subtipo = '5899' THEN 'Informação sobre Fiscalização
            de comércio ambulante'\n        WHEN t1.id_subtipo = '3366' THEN 'Comércio
            Ambulante'\n        ELSE t1.subtipo\n        END AS subtipo_tratado,\n\
            \n        -- Localização e unidade responsável\n        t1.subtipo,\n\
            \        t1.id_territorialidade,\n        t1.id_unidade_organizacional,\n\
            \        t1.nome_unidade_organizacional,\n        t1.id_bairro,\n    \
            \    t2.bairro,\n        t2.no_subprefeitura AS subprefeitura,\n     \
            \   t1.id_logradouro,\n        t1.numero_logradouro,\n\n        -- Status
            e tempo de atendimento\n        t1.status,\n        t1.situacao,\n   \
            \     t1.tipo_situacao,\n        t1.tempo_prazo,\n\n        -- Desfecho
            tratado: define qual dos dois disparos (HSM) esse chamado deve receber\n\
            \        CASE\n        WHEN t1.status IN ('Fechado com providências',
            'Fechado com solução') THEN 'ATENDIDA'\n        WHEN t1.status IN ('Sem
            possibilidade de atendimento', 'Fechado com informação', 'Não constatado')
            THEN 'SEM_RESOLUCAO'\n        END AS status_demanda_tratado\n\n    FROM
            rj-segovi.adm_central_atendimento_1746.chamado t1\n    LEFT JOIN rj-iplanrio.brutos_extracoes_google_sheets.relacao_bairro_subprefeitura
            t2\n        ON t1.id_bairro = t2.id_bairro\n    LEFT JOIN rj-segovi.adm_central_atendimento_1746.chamado_cpf
            t3\n        ON t1.id_chamado = t3.id_chamado\n    LEFT JOIN rj-segovi.adm_central_atendimento_1746.pessoa
            t4\n        ON t3.id_pessoa = CAST(t4.id_pessoa AS STRING)\n    LEFT JOIN
            rj-segovi.adm_central_atendimento_1746.origem_ocorrencia t5\n        ON
            t1.id_origem_ocorrencia = CAST(t5.id_origem_ocorrencia AS STRING)\n  \
            \  WHERE 1=1\n        AND t1.data_inicio >= '2025-01-01 00:00:00.000'
            -- Considera somente chamados a partir de Jan/25\n        AND (\n    \
            \        -- Aceitam qualquer categoria\n            t1.id_subtipo IN ('5899',
            '3366')\n            OR\n            -- Exigem ser \"Serviço\"\n     \
            \       (\n            t1.id_subtipo IN (\n            '2966', '1325',
            '5799', '78', '100', '1298', '1319', '1316', '1274', '1242', '1287', '5071',
            '1279', '2178', '3139', '114', '5841', '1101' )\n            AND t1.categoria
            IN (\"Serviço\")\n            )\n        ) --Considera somente 20 serviços
            selecionados pela SUBTD\n        AND t1.data_fim IS NOT NULL -- Somente
            chamados fechados\n        AND t1.id_bairro IS NOT NULL -- Somente chamados
            com bairro classificado\n        AND t1.id_origem_ocorrencia NOT IN ('23','25','27')
            -- Exclui Táxi.Rio, Facebook e Conservação\n        AND COALESCE(t4.telefone_1,
            t4.telefone_2, t4.telefone_3) IS NOT NULL -- Exclui sem telefone\n   \
            \     AND t3.ic_motivo IN ('E','O') -- Apenas ocorrências e equivalências\n\
            \        AND t1.status IN (\n            'Fechado com providências', 'Fechado
            com solução', -- ATENDIDA\n            'Sem possibilidade de atendimento',
            'Fechado com informação', 'Não constatado' -- SEM_RESOLUCAO\n        )\n\
            \    ),\n\n    dados_finais AS (\n    SELECT\n        numero_protocolo,\n\
            \        canal_tratado,\n        ta.cpf,\n        nome_tratado AS nome,\n\
            \        telefone,\n        data_inicio,\n        data_fim,\n        subtipo_tratado,\n\
            \        id_subtipo,\n        ta.status,\n        ta.status_demanda_tratado\n\
            \    FROM tabela_global ta\n    left join `rj-crm-registry.brutos_wetalkie_staging.fluxo_atendimento_*`
            fl\n            on fl.flattarget = ta.telefone\n            and fl.templateId
            = CAST(\n                CASE ta.status_demanda_tratado\n            \
            \        WHEN 'ATENDIDA' THEN {id_hsm_com_solucao_placeholder}\n     \
            \               WHEN 'SEM_RESOLUCAO' THEN {id_hsm_sem_resolucao_placeholder}\n\
            \                END AS int64)\n            and date(fl.createDate) =
            CURRENT_DATE(\"America/Sao_Paulo\") and fl.status=\"PROCESSING\"\n   \
            \ -- verifica também se esse cpf já recebeu essa mesma mensagem (nome_hsm
            correspondente ao\n    -- desfecho) hoje, via status_disparo (alimentada
            pelos disparos via SFTP/Salesforce)\n    left join `rj-crm-registry.brutos_salesforce.status_disparo`
            sd\n            on sd.cpf = ta.cpf\n            and sd.nome_hsm = CASE
            ta.status_demanda_tratado\n                    WHEN 'ATENDIDA' THEN '{nome_hsm_com_solucao_placeholder}'\n\
            \                    WHEN 'SEM_RESOLUCAO' THEN '{nome_hsm_sem_resolucao_placeholder}'\n\
            \                END\n            and DATE(sd.envio_datahora) = CURRENT_DATE(\"\
            America/Sao_Paulo\")\n            and sd.data_particao = CURRENT_DATE(\"\
            America/Sao_Paulo\")\n            and sd.indicador_quarentena = FALSE\n\
            \    WHERE fl.flattarget is null\n        AND sd.cpf is null\n       \
            \ AND DATE(data_fim) = DATE_SUB(CURRENT_DATE(), INTERVAL 1 DAY)\n    \
            \    AND telefone IS NOT NULL\n    )\n\n    -- Tabela simples (sem TO_JSON_STRING).
            'externalId' é controle interno (dedup por\n    -- CPF) e é descartado
            do CSV pelo de_columns antes do envio à Data Extension.\n    SELECT\n\
            \        telefone,\n        CAST(cpf AS STRING) AS SubscriberKey,\n  \
            \      CAST(cpf AS STRING) AS externalId,\n        CAST(cpf AS STRING)
            AS cpfCnpj,\n        nome AS cc_wt_nome_sobrenome,\n        subtipo_tratado
            AS cc_wt_solicitacao,\n        canal_tratado AS cc_wt_canal,\n       \
            \ CAST(numero_protocolo AS STRING) AS protocolo,\n        status_demanda_tratado
            AS STATUS_DEMANDA\n    FROM dados_finais;\n"
      - interval: 86400
        anchor_date: "2021-01-01T13:00:00"
        timezone: America/Sao_Paulo
        active: false
        slug: daily-pgm-divida-ativa-prod
        flow_run_name: pgm-divida-ativa
        parameters:
          flow_environment: staging
          query_replacements: {"nome_hsm_cobranca_placeholder": "pgm_divida_ativa_prod_v2",
            "limit_placeholder": 300, "id_hsm_legado_cobranca_placeholder": "196,
              239"}
          campaign_name: pgm_divida_ativa_prod_v2
          data_extension_filename: whatsapp_pgm_divida_ativa_cobranca
          de_columns: ["nome_sobrenome"]
          dataset_id: brutos_salesforce
          table_id: disparos_efetuados
          dump_mode: append
          test_mode: true
          sleep_minutes: 5
          filter_dispatched_phones_or_cpfs:
          filter_duplicated_phones: false
          filter_duplicated_cpfs: true
          whitelist_percentage: 0
          infisical_secret_path: "/crm_disparo_template"
          whitelist_environment: "production"
          query: "-- ===================== 1) MATERIALIZA =====================\n
            -- ===================== 1.1) CELULARES VÁLIDOS (PF) E *MÓVEIS* =====================\n
            CREATE TEMP TABLE tmp_grupos AS\n\nWITH celulares_validos AS (\nSELECT\n\
            \    cpf,\n    COALESCE(if(nome_social = \"\", null, nome_social), nome)
            AS nome_rmi,\n    pf.obito.indicador AS obito_indicador,\n    nascimento.data
            AS dt_nasc,\n    DATE_DIFF(CURRENT_DATE(\"America/Sao_Paulo\"), nascimento.data,
            YEAR) AS idade,\n    `rj-crm-registry.udf.VALIDATE_AND_FORMAT_PHONE`(\n\
            \    CONCAT(IFNULL(telefone.principal.ddi, '55'), telefone.principal.ddd,
            telefone.principal.valor)\n    ) AS celular_disparo,\n    CASE\n    WHEN
            pf.telefone.principal.estrategia_envio = \"ENVIAR\" THEN 0\n    WHEN pf.telefone.principal.estrategia_envio
            = \"TESTAR\" THEN 1\n    WHEN pf.telefone.principal.estrategia_envio =
            \"EVITAR\" THEN 2\n    ELSE 3\n    END AS phone_priority,\n    pf.telefone.principal.estrategia_envio,\n\
            \    pf.telefone.principal.qualidade\nFROM `rj-crm-registry-dev.dev__dev_fantasma__rmi_dados_mestres.pessoa_fisica`
            pf\nWHERE pf.telefone.principal.qualidade = 'VALIDO'\n    AND pf.telefone.principal.estrategia_envio
            != \"NÃO ENVIAR\"\n    AND pf.telefone.principal.estrategia_envio in (\"\
            ENVIAR\", \"TESTAR\", \"EVITAR\")\n    AND pf.telefone.principal.tipo
            = \"CELULAR\"\n    AND pf.telefone.principal.valor IS NOT NULL\n    AND
            pf.menor_idade IS FALSE\n    AND pf.obito.indicador IS FALSE\n    AND
            nascimento.data IS NOT NULL\n    AND EXTRACT(DAYOFWEEK FROM current_date(\"\
            America/Sao_Paulo\")) NOT IN (1, 7)\n),\nfiltra_disparados AS (\n-- verifica
            se esse cpf já recebeu essa mesma mensagem nos últimos x dias, tanto via\n
            -- status_disparo quanto via wetalkie (histórico legado pré-migração;
            templateId\n-- 196/239 = HSMs de cobrança da dívida ativa usadas antes
            da migração)\nSELECT celulares_validos.*\nFROM celulares_validos\nLEFT
            JOIN `rj-crm-registry.brutos_salesforce.status_disparo` sd\n    ON sd.cpf
            = celulares_validos.cpf\n    AND sd.nome_hsm = '{nome_hsm_cobranca_placeholder}'\n\
            \    AND sd.envio_datahora >= DATETIME_SUB(CURRENT_DATETIME(\"America/Sao_Paulo\"\
            ), INTERVAL 150 DAY)\n    AND sd.data_particao >= DATE_SUB(CURRENT_DATE(\"\
            America/Sao_Paulo\"), INTERVAL 151 DAY)\nLEFT JOIN `rj-crm-registry.brutos_wetalkie_staging.fluxo_atendimento_*`
            fl\n    ON fl.targetexternalid = celulares_validos.cpf\n    AND fl.templateId
            IN ({id_hsm_legado_cobranca_placeholder})\n    AND fl.createDate >= TIMESTAMP_SUB(CURRENT_TIMESTAMP(),
            INTERVAL 150 DAY)\nWHERE sd.cpf IS NULL AND fl.targetexternalid IS NULL\n
            ),\n\ncontribuintes AS (\n-- filtra PF e nome antes do unnest\nSELECT\n\
            \    LPAD(CAST(p.cpf_cnpj AS STRING), 11, '0') AS cpf,\n    coalesce(nome_rmi,
            nome) as nome,\n    cdas_associadas,\n    tipo_pessoa,\n    saldo_devido_cdas,\n\
            \    valor_cotas_devidas_vencidas\nFROM `rj-crm-registry-dev.dev__dev_fantasma__divida_ativa.contribuinte`
            p\nINNER JOIN filtra_disparados\n    ON LPAD(CAST(p.cpf_cnpj AS STRING),
            11, '0') = filtra_disparados.cpf\nWHERE p.tipo_pessoa.descricao_tipo_pessoa
            = 'Pessoa Física'\n    AND p.saldo_devido_cdas > 0\n    AND NOT STARTS_WITH(nome,
            'ESPÓLIO')\n),\n\nguia_pagamento_latest AS (\nSELECT\n    cpf,\n    p.nome,\n\
            \    cdas_associadas.id_certidao_divida_ativa AS id_certidao_divida_ativa,\n\
            \    cdas_associadas.data_geracao_cda AS data_geracao_cda,\n    cdas_associadas.situacao_cda.descricao_situacao_cda
            AS descricao_situacao_cda,\n    cdas_associadas.valor_saldo_devido AS
            valor_saldo_devido,\n    p.valor_cotas_devidas_vencidas,\n\n    CASE\n\
            \    WHEN p.valor_cotas_devidas_vencidas > 0\n        OR p.valor_cotas_devidas_vencidas
            IS NULL\n    THEN FALSE\n    ELSE TRUE\n    END AS esta_pagando\nFROM
            contribuintes p\nLEFT JOIN UNNEST(\n    ARRAY(\n    SELECT c\n    FROM
            UNNEST(p.cdas_associadas) c\n    WHERE c.situacao_cda.descricao_situacao_cda
            IN ('Inscrita','Cobrança')\n    )\n) AS cdas_associadas\nWHERE cdas_associadas.situacao_cda.descricao_situacao_cda
            IN ('Inscrita','Cobrança')\n),\n\n-- ===================== 1.2) BASE COM
            PAGAMENTOS =====================\n-- soma por cpf e cda primeiro, já que
            temos mais de uma linha por cda\nbase_ AS (\nSELECT\n    cpf,\n    MAX(nome)
            AS nome,\n    id_certidao_divida_ativa,\n    data_geracao_cda,\n    valor_saldo_devido,\n\
            \    MIN(esta_pagando) AS esta_pagando  --pode ser que esteja pagando
            uma CDA e outra não\nFROM guia_pagamento_latest\nGROUP BY\n    cpf,\n\
            \    id_certidao_divida_ativa,\n    data_geracao_cda,\n    valor_saldo_devido\n
            ),\n\n-- ===================== 1.3) UMA LINHA POR CPF =====================\n
            per_cpf AS (\nSELECT\n    b.cpf,\n    MAX(cm.dt_nasc) AS dt_nasc,\n  \
            \  MAX(cm.idade) AS idade,\n    MAX(cm.nome_rmi) AS nome,\n    MAX(cm.celular_disparo)
            AS celular_disparo,\n    MAX(cm.phone_priority) AS phone_priority,\n \
            \   MAX(b.data_geracao_cda) AS dt_ultima_cda,\n    COUNT(b.id_certidao_divida_ativa)
            AS n_cdas_ativas,\n    SUM(b.valor_saldo_devido) AS soma_divida_total,\n\
            \    MIN(esta_pagando) AS esta_pagando\nFROM base_ b\nJOIN filtra_disparados
            cm USING (cpf)\nGROUP BY 1\n),\n\nelegiveis_divida_ativa AS (\nSELECT
            *\nFROM per_cpf\nWHERE soma_divida_total <= 6000\n    AND esta_pagando
            = FALSE\n    AND idade <= 80\n    AND dt_ultima_cda >= DATE_SUB(CURRENT_DATE(),
            INTERVAL 30 MONTH)\n),\n\n-- ===================== 1.4) RANDOMIZAÇÃO DETERMINÍSTICA
            =====================\nrandomizados AS (\nSELECT *,\n    ROW_NUMBER()
            OVER (\n    ORDER BY ABS(FARM_FINGERPRINT(CONCAT(CAST(cpf AS STRING),
            '|seed:17041993')))\n    ) AS ordem_sorteio\nFROM elegiveis_divida_ativa\n
            ),\n\n-- ===================== 1.5) ATRIBUIÇÃO A GRUPOS ESCALONADOS =====================\n
            grupos_escalonados AS (\nSELECT\n    *,\n    CAST(\n    CEIL((SQRT(22500
            + 200 * ordem_sorteio) - 150) / 100)\n    AS INT64\n    ) AS grupo_escalonado,\n\
            \    100 * (\n    CAST(\n        CEIL((SQRT(22500 + 200 * ordem_sorteio)
            - 150) / 100)\n        AS INT64\n    ) + 1\n    ) AS tamanho_alvo_grupo\n
            FROM randomizados\n)\n\nSELECT * FROM grupos_escalonados;\n\n-- =====================
            2) INSERT: Insere dados da tabela de teste ab =====================\n
            -- Comentado na versão dev: `rj-crm-registry.ab_test.divida_ativa` é tabela
            de PRODUÇÃO\n-- (bucketing real do teste A/B). Não gravar dados de teste
