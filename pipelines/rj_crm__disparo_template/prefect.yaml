            data_evento) AS data,\n        horario_evento AS horario,\n    FROM dados_pic\n\
            \    WHERE COALESCE(celular_1, celular_2) IS NOT NULL\n)\nSELECT\n   \
            \ telefone,\n    cpf AS SubscriberKey,\n    nome_sobrenome,\n    endereco,\n\
            \    data,\n    horario\nFROM formatted\n"
