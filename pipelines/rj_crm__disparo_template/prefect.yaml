            dias,\n    -- tanto via status_disparo quanto via wetalkie (histórico
            legado pré-migração;\n    -- id_hsm_anterior_legado_placeholder = templateId
            da HSM D0)\n    select distinct filtra_falhas.*\n    FROM filtra_falhas\n\
