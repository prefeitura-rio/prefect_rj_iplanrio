            WHERE nome_sobrenome LIKE \"%patricia%\"\n"
      - interval: 86400
        anchor_date: "2021-01-01T13:00:00"
        timezone: America/Sao_Paulo
        active: false
        slug: daily-pgm-divida-ativa-lembrete-prod-v1
        flow_run_name: pgm-divida-ativa-lembrete
        parameters:
          flow_environment: staging
          campaign_name: pgmdividaativalembreteprodv1
          dataset_id: brutos_salesforce
          table_id: disparos_efetuados
          dump_mode: append
          test_mode: true
          sleep_minutes: 5
          filter_dispatched_phones_or_cpfs:
          filter_duplicated_phones: false
          filter_duplicated_cpfs: false
          whitelist_percentage: 0
          infisical_secret_path: "/crm_disparo_template"
          whitelist_environment: "production"
          query: "SELECT * FROM `rj-crm-registry-dev`.teste.pgm_divida_ativa_lembrete\n\
            WHERE nome_sobrenome LIKE \"%patricia%\"\n"
      - interval: 86400
        anchor_date: "2021-01-01T13:00:00"
        timezone: America/Sao_Paulo
        active: false
        slug: daily-pgm-divida-ativa-confirma-pgto-prod-v1
        flow_run_name: pgm-divida-ativa-confirma-pgto-prod-v1
        parameters:
          flow_environment: staging
          campaign_name: pgmdividaativaconfirmapgtoprodv1
          dataset_id: brutos_salesforce
          table_id: disparos_efetuados
          dump_mode: append
          test_mode: true
          sleep_minutes: 5
          filter_dispatched_phones_or_cpfs:
          filter_duplicated_phones: true
          filter_duplicated_cpfs: true
          whitelist_percentage: 0
          infisical_secret_path: "/crm_disparo_template"
          whitelist_environment: "production"
          query: "SELECT * FROM `rj-crm-registry-dev`.teste.pgm_divida_ativa_agradecimento\n\
            WHERE nome_sobrenome LIKE \"%patricia%\"\n"
      - cron: "0 10 * * *"
        timezone: America/Sao_Paulo
        active: false
        slug: daily-sms-puerpera-confirma-agendamento
        flow_run_name: sms-puerpera-confirma-agendamento
        parameters:
          flow_environment: staging
          query_replacements:
            nome_hsm_placeholder: _sms_puerpera_disp1_gestantev2
            intervalo_filtro_disparados: 1
          table_id: disparos_efetuados
          dump_mode: append
          test_mode: true
          dataset_id: brutos_salesforce
          campaign_name: _sms_puerpera_disp1_gestantev2
          data_extension_filename: whatsapp_sms_puerperas_confirma_agendamento
          de_columns: ["nome", "maternidade", "data", "hora"]
          max_dispatch_retries: 0
          sleep_minutes: 5
          whitelist_percentage: 100
          infisical_secret_path: /crm_disparo_template
          whitelist_environment: production
          filter_duplicated_cpfs: true
          filter_duplicated_phones: false
          filter_dispatched_phones_or_cpfs:
          filter_failed_phones: false
          force_add_on_whitelist_group: true
          whitelist_replace_contacts: true
          query: "WITH segmentacao_original AS (\n    SELECT\n        lpad(cast(cpf
            as string) , 11, '0') as cpf,\n        nome,\n        nome_maternidade_agendada
            AS maternidade,\n        data_hora_agendamento_visita_maternidade,\n\n\
            \        MAX(IF(telefone.prioridade = '1', telefone.telefone_valido_whatsapp,
            NULL)) AS celular_disparo_1,\n        MAX(IF(telefone.prioridade = '2',
            telefone.telefone_valido_whatsapp, NULL)) AS celular_disparo_2,\n    \
            \    MAX(IF(telefone.prioridade = '3', telefone.telefone_valido_whatsapp,
            NULL)) AS celular_disparo_3\n\n    FROM `rj-crm-registry-dev.dev__dev_fantasma__brutos_sms.siscegonha_agendamento_maternidade`,\n\
            \    -- FROM `rj-crm-registry-dev.brutos_sms.siscegonha_agendamento_maternidade_teste`,\n\
            \    UNNEST(telefones_gestante) AS telefone\n\n    WHERE cpf is not null\n\
            \        and cpf != '00000000000'\n        AND time(data_hora_agendamento_visita_maternidade)
            != '00:00:00'\n        AND DATE(data_hora_criacao_agendamento) =\n   \
            \         DATE_SUB(CURRENT_DATE('America/Sao_Paulo'), INTERVAL 1 DAY)\n\
            \            and nome_maternidade_agendada like '%MARIA AMELIA%'\n   \
            \ GROUP BY\n        cpf,\n        nome,\n        maternidade,\n      \
            \  data_hora_agendamento_visita_maternidade\n    ),\n    dados_rmi as
            (\n    -- os dados do rmi serão usados apenas caso a puérpera não tenha
            nenhum telefone atribuido\n            SELECT\n                cpf,\n\
            \                `rj-crm-registry.udf.VALIDATE_AND_FORMAT_PHONE`(CONCAT(ifnull(telefone.principal.ddi,
            '55'), telefone.principal.ddd, telefone.principal.valor)) AS celular_disparo_rmi,\n\
            \            FROM `rj-crm-registry.rmi_dados_mestres.pessoa_fisica` AS
            rmi\n            WHERE menor_idade is False\n            and obito.indicador
            is False\n            and telefone.principal.estrategia_envio in ('ENVIAR',
            'TESTAR')\n            ),\n    enriquece_rmi as \n    (\n    select\n\
            \    segmentacao_original.*,\n    dados_rmi.celular_disparo_rmi\n    from
            segmentacao_original\n    left join dados_rmi using(cpf)\n    ),\n\n \
            \   status_final_telefone AS (\n    -- verifica se telefones já tiveram
            falha, passo necessário já que o telefone principal não vem do RMI. Caso
            contrário, seria só necessário filtrar pela estratégia de envio\n    --
            qualquer falha conta (não só o código 131026 de \"número sem WhatsApp\"\
            )\n    SELECT\n        contato_telefone AS flatTarget,\n        indicador_falha
            AS falhou\n    FROM `rj-crm-registry.brutos_salesforce.status_disparo`\n\
            \    QUALIFY ROW_NUMBER() OVER (\n        PARTITION BY contato_telefone\n\
            \        ORDER BY envio_datahora DESC\n    ) = 1\n    ),\n\n    filtra_falhas
            AS (\n    SELECT\n        distinct \n        s.* EXCEPT(celular_disparo_1,
            celular_disparo_2, celular_disparo_3, celular_disparo_rmi),\n\n      \
            \  IF(f1.falhou, NULL, s.celular_disparo_1) AS celular_disparo_1,\n  \
            \      IF(f2.falhou, NULL, s.celular_disparo_2) AS celular_disparo_2,\n\
            \        IF(f3.falhou, NULL, s.celular_disparo_3) AS celular_disparo_3,\n\
            \        IF(f4.falhou, NULL, s.celular_disparo_rmi) AS celular_disparo_rmi,\n\
            \n        COALESCE(\n        IF(f1.falhou, NULL, s.celular_disparo_1),\n\
            \        IF(f2.falhou, NULL, s.celular_disparo_2),\n        IF(f3.falhou,
            NULL, s.celular_disparo_3),\n        IF(f4.falhou, NULL, s.celular_disparo_rmi)\n\
            \        ) AS celular_disparo\n\n    FROM enriquece_rmi s\n    LEFT JOIN
            status_final_telefone f1\n        ON f1.flatTarget = s.celular_disparo_1\n\
            \n    LEFT JOIN status_final_telefone f2\n        ON f2.flatTarget = s.celular_disparo_2\n\
            \n    LEFT JOIN status_final_telefone f3\n        ON f3.flatTarget = s.celular_disparo_3\n\
            \n    LEFT JOIN status_final_telefone f4\n        ON f4.flatTarget = s.celular_disparo_rmi\n\
            \    ),\n\n    filtra_disparados as (\n    -- verifica se esse cpf já
            recebeu essa mesma mensagem (nome_hsm_placeholder) nos últimos x dias\n\
            \        select filtra_falhas.*\n        FROM filtra_falhas\n        left
            join `rj-crm-registry.brutos_salesforce.status_disparo` sd\n         \
            \       on sd.cpf = filtra_falhas.cpf\n                and sd.nome_hsm
            = '{nome_hsm_placeholder}'\n                and sd.envio_datahora >= DATETIME_SUB(CURRENT_DATETIME('America/Sao_Paulo'),
            INTERVAL {intervalo_filtro_disparados} DAY)\n                and sd.data_particao
            >= DATE_SUB(CURRENT_DATE(), INTERVAL {intervalo_filtro_disparados} DAY)\n\
            \                and sd.indicador_falha = FALSE\n            where sd.cpf
            is null\n    ),\n    final as (\n        select\n        filtra_disparados.*,\n\
            \        from filtra_disparados\n    )\n    -- Tabela simples (sem TO_JSON_STRING).
            'externalId' (dedup por CPF) e 'others'\n    -- (retentativas) são controle
            interno, descartados do CSV pelo de_columns.\n    SELECT\n        celular_disparo
            AS telefone,\n        CAST(cpf AS STRING) AS SubscriberKey,\n        CAST(cpf
            AS STRING) AS externalId,\n        INITCAP(\n            IF(\n       \
            \         ARRAY_LENGTH(SPLIT(nome, ' ')) > 1,\n                CONCAT(SPLIT(nome,
            ' ')[SAFE_OFFSET(0)], ' '),\n                nome\n            )\n   \
            \     ) AS nome,\n        maternidade,\n        date(data_hora_agendamento_visita_maternidade)
            as data,\n        time(data_hora_agendamento_visita_maternidade) as hora,\n\
            \        ARRAY(SELECT x FROM UNNEST([celular_disparo_2, celular_disparo_3])
            AS x WHERE x IS NOT NULL AND x != celular_disparo) AS others\n    from
            final\n    where celular_disparo is not null\n"
      - cron: "0 14 * * *"
        timezone: America/Sao_Paulo
        active: false
        slug: daily-sms-puerperas-d0
        flow_run_name: sms-puerperas-d0
        parameters:
          flow_environment: staging
          query_replacements:
            nome_hsm_placeholder: smspuerperasdisparo25
            intervalo_filtro_disparados: 365
          table_id: disparos_efetuados
          dump_mode: append
          test_mode: true
          dataset_id: brutos_salesforce
          campaign_name: smspuerperasdisparo25
          data_extension_filename: whatsapp_sms_puerperas_explica_pesquisa
          de_columns: ["nome"]
          max_dispatch_retries: 0
          sleep_minutes: 5
          whitelist_percentage: 100
          infisical_secret_path: /crm_disparo_template
          whitelist_environment: production
          filter_duplicated_cpfs: true
          filter_duplicated_phones: false
          filter_dispatched_phones_or_cpfs:
          filter_failed_phones: false
          force_add_on_whitelist_group: true
          whitelist_replace_contacts: true
          query: "WITH segmentacao_original AS (\n    SELECT\n        lpad(cast(cpf
            as string) , 11, '0') as cpf,\n        nome,\n        data_alta_internacao,\n\
            \        telefones_gestante,\n    FROM `rj-crm-registry-dev.dev__dev_fantasma__brutos_sms.sisare_alta_maternidade`\n\
            \    -- from `rj-crm-registry-dev.brutos_sms.sisare_alta_maternidade_teste`\n\
            \    WHERE cpf is not null\n        and cpf != '00000000000'\n    AND
            DATE(data_alta_internacao) between\n            DATE_SUB(CURRENT_DATE('America/Sao_Paulo'),
            INTERVAL 2 DAY) and CURRENT_DATE('America/Sao_Paulo')\n            and
            nome_maternidade_alta like '%MARIA AMELIA%' -- todo: remover comentario\n\
            \    ),\n    telefones as (\n    select \n        lpad(cast(cpf as string)
            , 11, '0') as cpf,\n        nome,\n        MAX(data_alta_internacao) as
            data_alta_internacao,\n        MAX(IF(telefone.prioridade = '1', telefone.telefone_valido_whatsapp,
            NULL)) AS celular_disparo_1,\n        MAX(IF(telefone.prioridade = '2',
            telefone.telefone_valido_whatsapp, NULL)) AS celular_disparo_2,\n    \
            \    MAX(IF(telefone.prioridade = '3', telefone.telefone_valido_whatsapp,
            NULL)) AS celular_disparo_3\n    FROM segmentacao_original,\n    UNNEST(telefones_gestante)
            AS telefone\n    group by cpf, nome\n    ),\n    dados_rmi as (\n    --
            os dados do rmi serão usados apenas caso a puérpera não tenha nenhum telefone
            atribuido\n            SELECT\n                cpf,\n                `rj-crm-registry.udf.VALIDATE_AND_FORMAT_PHONE`(CONCAT(ifnull(telefone.principal.ddi,
            '55'), telefone.principal.ddd, telefone.principal.valor)) AS celular_disparo_rmi,\n\
            \            FROM `rj-crm-registry.rmi_dados_mestres.pessoa_fisica` AS
            rmi\n            WHERE menor_idade is False\n            and obito.indicador
            is False\n            and telefone.principal.estrategia_envio in ('ENVIAR',
            'TESTAR')\n    ),\n    enriquece_rmi as (\n        select\n          \
            \  telefones.*,\n            dados_rmi.celular_disparo_rmi\n         \
            \   from telefones\n        left join dados_rmi using(cpf)\n    ),\n \
            \   status_final_telefone AS (\n    -- verifica se telefones já tiveram
            falha, passo necessário já que o telefone principal não vem do RMI. Caso
            contrário, seria só necessário filtrar pela estratégia de envio\n    --
            qualquer falha conta (não só o código 131026 de \"número sem WhatsApp\"\
            )\n    SELECT\n        contato_telefone AS flatTarget,\n        indicador_falha
            AS falhou\n    FROM `rj-crm-registry.brutos_salesforce.status_disparo`\n\
            \    QUALIFY ROW_NUMBER() OVER (\n        PARTITION BY contato_telefone\n\
            \        ORDER BY envio_datahora DESC\n    ) = 1\n    ),\n\n    filtra_falhas
            AS (\n    SELECT\n        distinct \n        s.* EXCEPT(celular_disparo_1,
            celular_disparo_2, celular_disparo_3, celular_disparo_rmi),\n\n      \
            \  IF(f1.falhou, NULL, s.celular_disparo_1) AS celular_disparo_1,\n  \
            \      IF(f2.falhou, NULL, s.celular_disparo_2) AS celular_disparo_2,\n\
            \        IF(f3.falhou, NULL, s.celular_disparo_3) AS celular_disparo_3,\n\
            \        IF(f4.falhou, NULL, s.celular_disparo_rmi) AS celular_disparo_rmi,\n\
            \n        COALESCE(\n        IF(f1.falhou, NULL, s.celular_disparo_1),\n\
            \        IF(f2.falhou, NULL, s.celular_disparo_2),\n        IF(f3.falhou,
            NULL, s.celular_disparo_3),\n        IF(f4.falhou, NULL, s.celular_disparo_rmi)\n\
            \        ) AS celular_disparo\n\n    FROM enriquece_rmi s\n    LEFT JOIN
            status_final_telefone f1\n        ON f1.flatTarget = s.celular_disparo_1\n\
            \n    LEFT JOIN status_final_telefone f2\n        ON f2.flatTarget = s.celular_disparo_2\n\
            \n    LEFT JOIN status_final_telefone f3\n        ON f3.flatTarget = s.celular_disparo_3\n\
            \n    LEFT JOIN status_final_telefone f4\n        ON f4.flatTarget = s.celular_disparo_rmi\n\
            \    ),\n\n    filtra_disparados as (\n    -- verifica se esse cpf já
            recebeu essa mesma mensagem (nome_hsm_placeholder) nos últimos x dias\n\
            \        select filtra_falhas.*\n        FROM filtra_falhas\n        left
            join `rj-crm-registry.brutos_salesforce.status_disparo` sd\n         \
            \       on sd.cpf = filtra_falhas.cpf\n                and sd.nome_hsm
            = '{nome_hsm_placeholder}'\n                and sd.envio_datahora >= DATETIME_SUB(CURRENT_DATETIME('America/Sao_Paulo'),
            INTERVAL {intervalo_filtro_disparados} DAY) -- pessoa só recebe essa mensagem
            cerca de uma vez por ano podendo pegar mais de uma gravidez\n        \
            \        and sd.data_particao >= DATE_SUB(CURRENT_DATE(), INTERVAL {intervalo_filtro_disparados}
            DAY)\n                and sd.indicador_falha = FALSE\n            where
            sd.cpf is null\n    ),\n    final as (\n        select filtra_disparados.*
            from filtra_disparados\n    )\n    -- Tabela simples (sem TO_JSON_STRING).
            'externalId' (dedup por CPF) e 'others'\n    -- (retentativas) são controle
            interno, descartados do CSV pelo de_columns.\n    SELECT\n        celular_disparo
            AS telefone,\n        CAST(cpf AS STRING) AS SubscriberKey,\n        CAST(cpf
            AS STRING) AS externalId,\n        INITCAP(\n            IF(\n       \
            \         ARRAY_LENGTH(SPLIT(nome, ' ')) > 1,\n                CONCAT(SPLIT(nome,
            ' ')[SAFE_OFFSET(0)], ' '),\n                nome\n            )\n   \
            \     ) AS nome,\n        ARRAY(SELECT x FROM UNNEST([celular_disparo_2,
            celular_disparo_3]) AS x WHERE x IS NOT NULL AND x != celular_disparo)
            AS others\n    from final\n    where celular_disparo is not null\n"
      - cron: "0 10 * * *"
        timezone: America/Sao_Paulo
        active: false
        slug: daily-sms-puerperas-d1-d3-d5-d10-d13-d16-d19
        flow_run_name: sms-puerperas-d1-d3-d5-d10-d13-d16-d19
        parameters:
          flow_environment: staging
          query_replacements:
            nome_hsm_placeholder: smspuerperasdisparo4v3
            nome_hsm_anterior_placeholder: smspuerperasdisparo25
            pesquisa_id: "Pesquisa 1"
            datas_internacao: |
              DATE_ADD(DATE(data_alta_internacao), INTERVAL 1 DAY),
              DATE_ADD(DATE(data_alta_internacao), INTERVAL 3 DAY),
              DATE_ADD(DATE(data_alta_internacao), INTERVAL 5 DAY),
