            antes do envio à Data Extension.\n    select\n      distinct --distinct
            de novo porque temos id_certidao_divida_ativa com mesmo id_guia_pagamento\n\
            \        celular_disparo AS telefone,\n        CAST(cpf AS STRING) AS
            SubscriberKey,\n        CAST(cpf AS STRING) AS externalId,\n        INITCAP(\n\
            \            IF(\n                ARRAY_LENGTH(SPLIT(nome, ' ')) > 1,\n\
            \                CONCAT(\n                    SPLIT(nome, ' ')[SAFE_OFFSET(0)],
            ' ',\n                    SPLIT(nome, ' ')[SAFE_OFFSET(ARRAY_LENGTH(SPLIT(nome,
            ' ')) - 1)]\n                ),\n                nome\n            )\n\
            \        ) AS nome_sobrenome,\n        data_vencimento,\n        guia
            AS numero_guia,\n        CONCAT('R$ ', REPLACE(cast(valor_cota as string),
            '.', ',')) AS valor_guia,\n        codigo_barras AS cod_boleto,\n    \
            \    codigo_qr_pix AS cod_pix\n    from remove_optout\n    where rn=1\n\
            \    and data_vencimento = date_add(current_date(\"America/Sao_Paulo\"\
            ), interval 2 day) -- esse filtro tem que estar aqui em vez de dentro
            do remove_duplicados pq lá selecionamos a com menor data de vencimento
            que não foi paga, com isso já elimino quem está com guias atrasadas não
            pagas\n"
