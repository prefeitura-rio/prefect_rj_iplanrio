            \        cotas.valor_cota_guia_pagamento as valor_cota,\n        -- seleciono
            a última guia gerada por pessoa para cada cda\n        row_number() over
            (partition by cpf, id_certidao_divida_ativa order by data_criacao_guia
            desc, cotas.data_vencimento) as rn, --pego a última guia gerada por pessoa
            para cada cda e dentro dessa a com menor data de vencimento que não foi
            paga, com isso já elimino quem está com guias atrasadas não pagas\n  \
            \      -- rn1 > 1 significa que a pessoa tem mais de uma cota vencendo
            no mesmo dia com valores distintos,\n        -- aparentemente acontece
            quando cotas.observacoes != \"Encaminhada para Protesto\"\n        rank()
            over (partition by cpf, cotas.data_vencimento order by cotas.valor_cota_guia_pagamento
            desc) as rn1\n        from divida_ativa\n        where cotas.cota_paga
            = false -- esse filtro precisa estar aqui por conta do rn e por filtrarmos
            cotas_pagas depois de pegar a última guia de pagamento\n        -- and
            quantidade_cotas_devidas_vencidas = 0 -- nao lembrar quem já está com
            cota atrasada pq ela deveria gerar outra guia, está comentado pois em
            alguns casos parece estar errado\n        and descricao_situacao_cda not
            in (\"Paga\", \"Parcelamento Irregular\") -- não mexer na localização
            desse filtro\n        and cotas.codigo_barras is not null\n        and
            cotas.codigo_qr_pix is not null\n\n    ),\n    remove_optout as (\n  \
            \      select remove_duplicados.*,\n        COALESCE(if(pf.nome_social
