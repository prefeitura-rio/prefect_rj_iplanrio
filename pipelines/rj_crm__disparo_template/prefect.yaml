            as (\n    select\n    cpf,\n    celular_disparo,\n    row_number() over
            (partition by cpf order by data_pagamento desc) as rn,\n    from divida_ativa\n
            ),\n\nremove_optout as (\n    select remove_duplicados.*,\n    coalesce(pf.nome_social,
            pf.nome) as nome,\n    from remove_duplicados\n    left join `rj-crm-registry-dev.dev__dev_fantasma__rmi_dados_mestres.pessoa_fisica`
            pf using(cpf)\n    where pf.telefone.principal.indicador_optout = false\n\
            \    and pf.telefone.principal.indicador_quarentena = false\n)\n\n-- Tabela
            simples (sem TO_JSON_STRING). 'externalId' é controle interno (dedup por\n
