            t.telefone_formatado AS celular_disparo,
            CAST(rmi.cpf AS STRING) AS externalId
          FROM rmi
          INNER JOIN telefone_por_cpf AS t ON rmi.cpf = t.cpf
          LEFT JOIN grupo_whatsapp AS gw ON CAST(rmi.cpf AS STRING) = gw.externalId
          WHERE LOWER(rmi.endereco.principal.bairro) = 'acari'
            AND gw.externalId IS NULL
          ORDER BY ABS(FARM_FINGERPRINT(CONCAT(CAST(rmi.cpf AS STRING), '|seed:42')))
