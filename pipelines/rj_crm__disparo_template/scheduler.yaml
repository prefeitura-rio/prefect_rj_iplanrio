        telefone_por_cpf AS (
          SELECT cpf, telefone_formatado
          FROM todos_telefones_rmi
          WHERE telefone_formatado IS NOT NULL
          QUALIFY ROW_NUMBER() OVER (PARTITION BY cpf ORDER BY origem ASC, telefone_formatado) = 1
        ),

        -- 7. Cruza os números do grupo WhatsApp Acari com o RMI para recuperar o CPF
        --    Quem não tiver CPF no RMI é descartado
