# Daily schedule para flow pgm-divida-ativa-prod
  - interval: 86400
    anchor_date: "2021-01-01T10:00:00"
    timezone: America/Sao_Paulo
    active: true
    slug: daily-pgm-divida-ativa-prod
    flow_run_name: pgm-divida-ativa
    parameters:
      id_hsm: 239
      query_replacements: {"id_hsm_placeholder": 239, "limit_placeholder": 200}
      campaign_name: pgm-divida-ativa-prod-v2
      cost_center_id: 71
      chunk_size: 1000
      dataset_id: brutos_wetalkie
      table_id: disparos_efetuados
      dump_mode: append
      test_mode: false
      sleep_minutes: 5
      flow_environment: production
      filter_dispatched_phones_or_cpfs: null
      filter_duplicated_phones: false
      filter_duplicated_cpfs: true
      whitelist_percentage: 0
      infisical_secret_path: "/wetalkie"
      whitelist_environment: "production"
      query: |
        -- ===================== 1) MATERIALIZA =====================
        -- ===================== 1.1) CELULARES VÁLIDOS (PF) E *MÓVEIS* =====================
        CREATE TEMP TABLE tmp_grupos AS

        WITH celulares_validos AS (
        SELECT
            cpf,
            COALESCE(nome_social, nome) AS nome_rmi,
            pf.obito.indicador AS obito_indicador,
            nascimento.data AS dt_nasc,
            DATE_DIFF(CURRENT_DATE("America/Sao_Paulo"), nascimento.data, YEAR) AS idade,
            `rj-crm-registry.udf.VALIDATE_AND_FORMAT_PHONE`(
            CONCAT(IFNULL(telefone.principal.ddi, '55'), telefone.principal.ddd, telefone.principal.valor)
            ) AS celular_disparo,
            CASE
            WHEN pf.telefone.principal.estrategia_envio = "ENVIAR" THEN 0
            WHEN pf.telefone.principal.estrategia_envio = "TESTAR" THEN 1
            ELSE 2
            END AS phone_priority,
            pf.telefone.principal.estrategia_envio,
            pf.telefone.principal.qualidade
        FROM `rj-crm-registry.rmi_dados_mestres.pessoa_fisica` pf
        WHERE pf.telefone.principal.qualidade = 'VALIDO'
            AND pf.telefone.principal.estrategia_envio != "NÃO ENVIAR"
            AND pf.telefone.principal.tipo = "CELULAR"
            AND pf.telefone.principal.valor IS NOT NULL
            AND pf.menor_idade IS FALSE
            AND pf.obito.indicador IS FALSE
            AND nascimento.data IS NOT NULL
        ),

        filtra_disparados AS (
        -- verifica se esse cpf já recebeu essa mesma mensagem nos últimos x dias
        SELECT celulares_validos.*
        FROM celulares_validos
        LEFT JOIN `rj-crm-registry.brutos_wetalkie_staging.fluxo_atendimento_*` fl
            ON fl.targetexternalid = cpf
            AND fl.templateId IN (196, 239)
            AND fl.createDate >= TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL 150 DAY)
        WHERE fl.flattarget IS NULL
        ),

        contribuintes AS (
        -- filtra PF e nome antes do unnest
        SELECT
            LPAD(CAST(p.cpf_cnpj AS STRING), 11, '0') AS cpf,
            nome,
            cdas_associadas,
            tipo_pessoa,
            saldo_devido_cdas,
            valor_cotas_devidas_vencidas
        FROM `rj-iplanrio.divida_ativa.contribuinte` p
        INNER JOIN filtra_disparados
            ON LPAD(CAST(p.cpf_cnpj AS STRING), 11, '0') = filtra_disparados.cpf
        WHERE p.tipo_pessoa.descricao_tipo_pessoa = 'Pessoa Física'
            AND p.saldo_devido_cdas > 0
            AND NOT STARTS_WITH(nome, 'ESPÓLIO')
        ),

        guia_pagamento_latest AS (
        SELECT
            cpf,
            p.nome,
            cdas_associadas.id_certidao_divida_ativa AS id_certidao_divida_ativa,
            cdas_associadas.data_geracao_cda AS data_geracao_cda,
            cdas_associadas.situacao_cda.descricao_situacao_cda AS descricao_situacao_cda,
            cdas_associadas.valor_saldo_devido AS valor_saldo_devido,
            p.valor_cotas_devidas_vencidas,

            CASE
            WHEN p.valor_cotas_devidas_vencidas > 0
                OR p.valor_cotas_devidas_vencidas IS NULL
            THEN FALSE
            ELSE TRUE
            END AS esta_pagando
        FROM contribuintes p
        LEFT JOIN UNNEST(
            ARRAY(
            SELECT c
            FROM UNNEST(p.cdas_associadas) c
            WHERE c.situacao_cda.descricao_situacao_cda IN ('Inscrita','Cobrança')
            )
        ) AS cdas_associadas
        WHERE cdas_associadas.situacao_cda.descricao_situacao_cda IN ('Inscrita','Cobrança')
        ),

        -- ===================== 1.2) BASE COM PAGAMENTOS =====================
        -- soma por cpf e cda primeiro, já que temos mais de uma linha por cda
        base_ AS (
        SELECT
            cpf,
            MAX(nome) AS nome,
            id_certidao_divida_ativa,
            data_geracao_cda,
            valor_saldo_devido,
            MIN(esta_pagando) AS esta_pagando  --pode ser que esteja pagando uma CDA e outra não
        FROM guia_pagamento_latest
        GROUP BY
            cpf,
            id_certidao_divida_ativa,
            data_geracao_cda,
            valor_saldo_devido
        ),

        -- ===================== 1.3) UMA LINHA POR CPF =====================
        per_cpf AS (
        SELECT
            b.cpf,
            MAX(cm.dt_nasc) AS dt_nasc,
            MAX(cm.idade) AS idade,
            MAX(cm.nome_rmi) AS nome,
            MAX(cm.celular_disparo) AS celular_disparo,
            MAX(cm.phone_priority) AS phone_priority,
            MAX(b.data_geracao_cda) AS dt_ultima_cda,
            COUNT(b.id_certidao_divida_ativa) AS n_cdas_ativas,
            SUM(b.valor_saldo_devido) AS soma_divida_total,
            MIN(esta_pagando) AS esta_pagando
        FROM base_ b
        JOIN filtra_disparados cm USING (cpf)
        GROUP BY 1
        ),

        elegiveis_divida_ativa AS (
        SELECT *
        FROM per_cpf
        WHERE soma_divida_total <= 3500
            AND esta_pagando = FALSE
            AND idade < 60
            AND dt_ultima_cda >= DATE_SUB(CURRENT_DATE(), INTERVAL 12 MONTH)
        ),

        -- ===================== 1.4) RANDOMIZAÇÃO DETERMINÍSTICA =====================
        randomizados AS (
        SELECT *,
            ROW_NUMBER() OVER (
            ORDER BY ABS(FARM_FINGERPRINT(CONCAT(CAST(cpf AS STRING), '|seed:17041993')))
            ) AS ordem_sorteio
        FROM elegiveis_divida_ativa
        ),

        -- ===================== 1.5) ATRIBUIÇÃO A GRUPOS ESCALONADOS =====================
        grupos_escalonados AS (
        SELECT
            *,
            CAST(
            CEIL((SQRT(22500 + 200 * ordem_sorteio) - 150) / 100)
            AS INT64
            ) AS grupo_escalonado,
            100 * (
            CAST(
                CEIL((SQRT(22500 + 200 * ordem_sorteio) - 150) / 100)
                AS INT64
            ) + 1
            ) AS tamanho_alvo_grupo
        FROM randomizados
        )

        SELECT * FROM grupos_escalonados;

        -- ===================== 2) INSERT: Insere dados da tabela de teste ab =====================
        INSERT INTO `rj-crm-registry.ab_test.divida_ativa`
        SELECT
        cpf,
        celular_disparo,
        nome,
        grupo_escalonado,
        ordem_sorteio,
        tamanho_alvo_grupo,
        soma_divida_total,
        n_cdas_ativas,
        esta_pagando,
        idade,
        CURRENT_TIMESTAMP(),
        cast(cpf as int) as cpf_particao
        FROM tmp_grupos;

        -- ===================== 3) Estrutura dados para o disparo =====================
        SELECT
        TO_JSON_STRING(
            STRUCT(
            celular_disparo,
            STRUCT(
                INITCAP(
                IF(
                    ARRAY_LENGTH(SPLIT(nome, ' ')) > 1,
                    CONCAT(
                    SPLIT(nome, ' ')[SAFE_OFFSET(0)], ' ',
                    SPLIT(nome, ' ')[SAFE_OFFSET(ARRAY_LENGTH(SPLIT(nome, ' ')) - 1)]
                    ),
                    nome
                )
                ) AS NOME_SOBRENOME,
                INITCAP(
                IF(
                    ARRAY_LENGTH(SPLIT(nome, ' ')) > 1,
                    CONCAT(
                    SPLIT(nome, ' ')[SAFE_OFFSET(0)], ' ',
                    SPLIT(nome, ' ')[SAFE_OFFSET(ARRAY_LENGTH(SPLIT(nome, ' ')) - 1)]
                    ),
                    nome
                )
                ) AS CC_WT_NOME_SOBRENOME,
                cpf AS CC_WT_CPF_CIDADAO,
                CAST(grupo_escalonado AS STRING) AS CC_WT_GRUPO_ESCALONADO,
                CAST(ordem_sorteio AS STRING) AS CC_WT_ORDEM_SORTEIO,
                CAST(tamanho_alvo_grupo AS STRING) AS CC_WT_TAMANHO_ALVO_GRUPO
            ) AS vars,
            CAST(cpf AS STRING) AS externalId
            )
        ) AS destination_data
        FROM tmp_grupos
        ORDER BY ordem_sorteio
        LIMIT cast({limit_placeholder} as int64);

# Daily schedule para flow pgm-divida-ativa-lembrete-prod-v1
  - interval: 86400
    anchor_date: "2021-01-01T10:00:00"
    timezone: America/Sao_Paulo
    active: true
    slug: daily-pgm-divida-ativa-lembrete-prod-v1
    flow_run_name: pgm-divida-ativa-lembrete
    parameters:
      id_hsm: 227
      campaign_name: pgm-divida-ativa-lembrete-prod-v1
      cost_center_id: 71
      chunk_size: 1000
      dataset_id: brutos_wetalkie
      table_id: disparos_efetuados
      dump_mode: append
      test_mode: false
      sleep_minutes: 5
      flow_environment: production
      filter_dispatched_phones_or_cpfs: null
      filter_duplicated_phones: false
      filter_duplicated_cpfs: false
      whitelist_percentage: 0
      infisical_secret_path: "/wetalkie"
      whitelist_environment: "production"
      query: |
        with
            disparos_divida_ativa as (
                -- quem recebeu os disparos de whatsapp sem erros
                select distinct targetexternalid as cpf,
                flattarget as celular_disparo,
                (DATE(createdate)) as data_disparo,
                templateId as id_hsm
                from `rj-crm-registry.brutos_wetalkie_staging.fluxo_atendimento_*`
                where templateid in (196, 227, 239)
                and faileddate is null
            ),
            disparos as (
                -- traz último disparo de cobrança e lembrete
                select cpf, celular_disparo,
                max(case when id_hsm in (196, 239) then data_disparo else null end) as data_disparo_cobranca,
                max(case when id_hsm = 227 then data_disparo else null end) as data_disparo_lembrete,
                from disparos_divida_ativa
                group by 1, 2
            ),
            filtra_contribuinte as (
                select
                    disparos.*,
                    contribuinte.guias_pagamento,
                    contribuinte.cdas_associadas,
                    quantidade_cotas_devidas_vencidas
                FROM `rj-iplanrio.divida_ativa.contribuinte` AS contribuinte
                INNER JOIN disparos ON lpad(cpf_cnpj, 11, "0") = disparos.cpf
            ),
            divida_ativa as (
                -- seleciona dados da tabela de dívida ativa do lake
                SELECT
                filtra_contribuinte.* except(guias_pagamento, cdas_associadas),
                quantidade_cotas_devidas_vencidas,
                cotas AS cotas,
                cdas_associadas.id_certidao_divida_ativa as id_certidao_divida_ativa,
                guia_pagamento.id_guia_pagamento,
                guia_pagamento.numero_processo_associado,
                guia_pagamento.data_criacao_guia,
                cdas_associadas.situacao_cda.descricao_situacao_cda as descricao_situacao_cda,
                FROM filtra_contribuinte
                CROSS JOIN UNNEST(guias_pagamento) AS guia_pagamento
                CROSS JOIN UNNEST(guia_pagamento.cotas) AS cotas
                CROSS JOIn UNNEST(cdas_associadas) as cdas_associadas
                -- criacao da guia de pagamento após o disparo
                where data_disparo_cobranca <= guia_pagamento.data_criacao_guia or guia_pagamento.data_criacao_guia is null -- deixar para não enviar para guias abertas antes do disparo dessa pessoa
                  and cotas.observacoes != "Encaminhada para Protesto"  -- TODO: nesse caso temos mais de uma cota vencendo no mesmo dia pra mesma pessoa, ignoramos essas pessoas, disparamos mais de uma HSM ou mudamos a HSM? para visualizar usar where rn1>1 na próxima query.
            ),
            remove_duplicados as (
                select distinct
                cpf,
                celular_disparo,
                cotas.codigo_barras,
                cotas.codigo_qr_pix,
                data_disparo_cobranca,
                id_guia_pagamento as guia,
                descricao_situacao_cda,
                cotas.data_vencimento as data_vencimento,
                cotas.valor_cota_guia_pagamento as valor_cota,
                -- seleciono a última guia gerada por pessoa para cada cda
                row_number() over (partition by cpf, id_certidao_divida_ativa order by data_criacao_guia desc, cotas.data_vencimento) as rn, --pego a última guia gerada por pessoa para cada cda e dentro dessa a com menor data de vencimento que não foi paga, com isso já elimino quem está com guias atrasadas não pagas
                -- rn1 > 1 significa que a pessoa tem mais de uma cota vencendo no mesmo dia com valores distintos,
                -- aparentemente acontece quando cotas.observacoes != "Encaminhada para Protesto"
                rank() over (partition by cpf, cotas.data_vencimento order by cotas.valor_cota_guia_pagamento desc) as rn1
                from divida_ativa
                where cotas.cota_paga = false -- esse filtro precisa estar aqui por conta do rn e por filtrarmos cotas_pagas depois de pegar a última guia de pagamento
                -- and quantidade_cotas_devidas_vencidas = 0 -- nao lembrar quem já está com cota atrasada pq ela deveria gerar outra guia, está comentado pois em alguns casos parece estar errado
                and descricao_situacao_cda not in ("Paga", "Parcelamento Irregular") -- não mexer na localização desse filtro
                and cotas.codigo_barras is not null
                and cotas.codigo_qr_pix is not null
                
            ),
            remove_optout as (
                select remove_duplicados.*,
                coalesce(pf.nome_social, pf.nome) as nome,
                from remove_duplicados
                left join `rj-crm-registry.rmi_dados_mestres.pessoa_fisica` pf using(cpf)
                where pf.telefone.principal.indicador_optout = false
                and pf.telefone.principal.indicador_quarentena = false
            )

            select
              distinct --distinct de novo porque temos id_certidao_divida_ativa com mesmo id_guia_pagamento
            -- distinct * except(id_certidao_divida_ativa)
                TO_JSON_STRING(
                            STRUCT(
                                celular_disparo,
                                STRUCT(
                                    INITCAP(
                                    IF(
                                        ARRAY_LENGTH(SPLIT(nome, ' ')) > 1,
                                        CONCAT(
                                            SPLIT(nome, ' ')[SAFE_OFFSET(0)], ' ',
                                            SPLIT(nome, ' ')[SAFE_OFFSET(ARRAY_LENGTH(SPLIT(nome, ' ')) - 1)]
                                        ),
                                        nome
                                    )
                                    )  AS NOME_SOBRENOME,
                                    INITCAP(
                                        IF(
                                            ARRAY_LENGTH(SPLIT(nome, ' ')) > 1,
                                            CONCAT(
                                                SPLIT(nome, ' ')[SAFE_OFFSET(0)], ' ',
                                                SPLIT(nome, ' ')[SAFE_OFFSET(ARRAY_LENGTH(SPLIT(nome, ' ')) - 1)]
                                            ),
                                            nome
                                        )
                                    ) AS CC_WT_NOME_SOBRENOME,
                                    cpf AS CC_WT_CPF_CIDADAO,
                                    data_vencimento as DATA_VENCIMENTO,
                                    data_vencimento as CC_WT_DATA_VENCIMENTO,
                                    data_disparo_cobranca as CC_WT_ULTIMO_DISPARO_COBRANCA,
                                    guia as CC_WT_NUMERO_GUIA,
                                    CONCAT('R$ ', REPLACE(cast(valor_cota as string), '.', ',')) as CC_WT_VALOR_GUIA,
                                    codigo_barras as CC_WT_COD_BOLETO,
                                    codigo_qr_pix as CC_WT_COD_PIX
                                    
                                ) AS vars,
                                CAST(cpf AS STRING) AS externalId
                                )
                            ) AS destination_data
            from remove_optout
            where rn=1
            and data_vencimento = date_add(current_date("America/Sao_Paulo"), interval 2 day) -- esse filtro tem que estar aqui em vez de dentro do remove_duplicados pq lá selecionamos a com menor data de vencimento que não foi paga, com isso já elimino quem está com guias atrasadas não pagas

# Daily schedule para flow pgm-divida-ativa-confirma-pgto-prod-v1
  - interval: 86400
    anchor_date: "2021-01-01T10:00:00"
    timezone: America/Sao_Paulo
    active: true
    slug: daily-pgm-divida-ativa-confirma-pgto-prod-v1
    flow_run_name: pgm-divida-ativa-confirma-pgto-prod-v1
    parameters:
      id_hsm: 231
      campaign_name: pgm-divida-ativa-confirma-pgto-prod-v1
      cost_center_id: 71
      chunk_size: 1000
      dataset_id: brutos_wetalkie
      table_id: disparos_efetuados
      dump_mode: append
      test_mode: false
      sleep_minutes: 5
      flow_environment: production
      filter_dispatched_phones_or_cpfs: null
      filter_duplicated_phones: true
      filter_duplicated_cpfs: true
      whitelist_percentage: 0
      infisical_secret_path: "/wetalkie"
      whitelist_environment: "production"
      query: |
        WITH
        disparos_divida_ativa as (
            -- quem recebeu os disparos de whatsapp sem erros
            select distinct targetexternalid as cpf,
            flattarget as celular_disparo,
            DATE(createdate) as data_disparo,
            templateId as id_hsm,
            failedDate
            from `rj-crm-registry.brutos_wetalkie_staging.fluxo_atendimento_*`
            where templateid in (196, 227, 231, 239)
        ),

        disparos as (
            -- traz último disparo de cobrança, lembrete e agradecimento
            select cpf, celular_disparo,
            max(failedDate) as ultima_data_falha,
            max(case when id_hsm in (196, 239) then data_disparo else null end) as data_disparo_cobranca,
            max(case when id_hsm = 227 then data_disparo else null end) as data_disparo_lembrete,
            max(case when id_hsm = 231 then data_disparo else null end) as data_disparo_agradecimento,
            from disparos_divida_ativa
            group by 1, 2
        ),

        disparos_filtro as (
        select
        *
        from disparos
        where
            -- filtro falhas aqui pq se falhou na segunda/última hsm ele vai continuar enviando o agradecimento e pagando para falhar
            ultima_data_falha is null
        -- filtra se a pessoa já recebeu o agradecimento há pouco tempo já que ela pode ter mais de uma cota por mês
        and  (data_disparo_agradecimento is null or data_disparo_agradecimento <= date_sub(current_date(), INTERVAL 180 day)) --mudar !!

        ),

        filtra_contribuinte as (
            select
                disparos_filtro.*,
                contribuinte.guias_pagamento
            FROM `rj-iplanrio.divida_ativa.contribuinte` AS contribuinte
            INNER JOIN disparos_filtro ON lpad(cpf_cnpj, 11, "0") = disparos_filtro.cpf
        ),

        divida_ativa as (
            select
            filtra_contribuinte.* except(guias_pagamento),
            guia_pagamento.data_criacao_guia,
            guia_pagamento.id_guia_pagamento,
            cotas.id_cota_guia_pagamento,
            cotas.data_pagamento,
            cotas.cota_paga

            FROM filtra_contribuinte

            INNER JOIN UNNEST(guias_pagamento) AS guia_pagamento

            -- filtra cotas antes de explodir tudo (melhora performance e corrige o problema do filtro)
            INNER JOIN UNNEST(
                ARRAY(
                    SELECT c
                    FROM UNNEST(guia_pagamento.cotas) c
                    WHERE 
                    c.cota_paga = TRUE
                    AND c.data_pagamento >= date_sub(current_date("America/Sao_Paulo"), interval 5 day)
                    AND c.observacoes != "Encaminhada para Protesto"
                )
            ) AS cotas

            -- criacao da guia de pagamento após o disparo
            where 
            (
                data_disparo_cobranca <= guia_pagamento.data_criacao_guia 
                or guia_pagamento.data_criacao_guia is null
            ) -- deixar para não enviar para guias abertas antes do disparo dessa pessoa
        ),

        remove_duplicados as (
            select
            cpf,
            celular_disparo,
            row_number() over (partition by cpf order by data_pagamento desc) as rn,
            from divida_ativa
        ),

        remove_optout as (
            select remove_duplicados.*,
            coalesce(pf.nome_social, pf.nome) as nome,
            from remove_duplicados
            left join `rj-crm-registry.rmi_dados_mestres.pessoa_fisica` pf using(cpf)
            where pf.telefone.principal.indicador_optout = false
            and pf.telefone.principal.indicador_quarentena = false
        )

        select
            TO_JSON_STRING(
                        STRUCT(
                            celular_disparo,
                            STRUCT(
                                INITCAP(
                                IF(
                                    ARRAY_LENGTH(SPLIT(nome, ' ')) > 1,
                                    CONCAT(
                                        SPLIT(nome, ' ')[SAFE_OFFSET(0)], ' ',
                                        SPLIT(nome, ' ')[SAFE_OFFSET(ARRAY_LENGTH(SPLIT(nome, ' ')) - 1)]
                                    ),
                                    nome
                                )
                                )  AS NOME_SOBRENOME,
                                INITCAP(
                                    IF(
                                        ARRAY_LENGTH(SPLIT(nome, ' ')) > 1,
                                        CONCAT(
                                            SPLIT(nome, ' ')[SAFE_OFFSET(0)], ' ',
                                            SPLIT(nome, ' ')[SAFE_OFFSET(ARRAY_LENGTH(SPLIT(nome, ' ')) - 1)]
                                        ),
                                        nome
                                    )
                                ) AS CC_WT_NOME_SOBRENOME,
                                cpf AS CC_WT_CPF_CIDADAO
                            ) AS vars,
                            CAST(cpf AS STRING) AS externalId
                            )
                        ) AS destination_data
        from remove_optout
        where rn=1

