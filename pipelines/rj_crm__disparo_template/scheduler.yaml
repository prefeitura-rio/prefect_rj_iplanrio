        dia1 AS (
          SELECT * FROM grupo_whatsapp
          UNION ALL
          SELECT * FROM numeros_fixos
          UNION ALL
          SELECT * FROM amostra_acari
          UNION ALL
          SELECT * FROM amostra_jardim_maravilha
