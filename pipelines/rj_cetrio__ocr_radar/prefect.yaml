name: rj_cetrio__ocr_radar
prefect-version: 3.4.3

build:
  - prefect.deployments.steps.run_shell_script:
      id: get-commit-hash
      script: git rev-parse --short HEAD
      stream_output: false
  - prefect_docker.deployments.steps.build_docker_image:
      id: build-image
      requires: prefect-docker>=0.6.5
      image_name: ghcr.io/prefeitura-rio/prefect_rj_iplanrio/deployments
      tag: "rj_cetrio__ocr_radar-{{ get-commit-hash.stdout }}"
      dockerfile: pipelines/rj_cetrio__ocr_radar/Dockerfile

push:
  - prefect_docker.deployments.steps.push_docker_image:
      requires: prefect-docker>=0.6.5
      image_name: "{{ build-image.image_name }}"
      tag: "{{ build-image.tag }}"

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /opt/prefect/prefect_rj_iplanrio

deployments:
  - name: rj-cetrio--ocr_radar--staging
    version: "{{ build-image.tag }}"
    entrypoint: pipelines/rj_cetrio__ocr_radar/flow.py:rj_cetrio__ocr_radar
    work_pool:
      name: k3s-pool
      work_queue_name: default
      job_variables:
        image: "{{ build-image.image_name }}:{{ build-image.tag }}"
        command: uv run --package rj_cetrio__ocr_radar -- prefect flow-run execute
        secretName: prefect-jobs-secrets
        image_pull_policy: Always
  - name: rj-cetrio--ocr_radar--prod
    version: "{{ get-commit-hash.stdout }}"
    entrypoint: pipelines/rj_cetrio__ocr_radar/flow.py:rj_cetrio__ocr_radar
    work_pool:
      name: k3s-pool
      work_queue_name: default
      job_variables:
        image: "{{ build-image.image_name }}:{{ build-image.tag }}"
        command: uv run --package rj_cetrio__ocr_radar -- prefect flow-run execute
        secretName: prefect-jobs-secrets
        image_pull_policy: Always

    schedules:
      - interval: 86400
        anchor_date: "2024-07-07T20:30:00"
        timezone: America/Sao_Paulo
        slug: equipamento
        parameters:
          table_id: equipamento
          dump_mode: overwrite
          execute_query: |
            SELECT * FROM [DBOCR_2025].[dbo].[Equipamento]

      - interval: 86400
        anchor_date: "2024-07-07T20:40:00"
        timezone: America/Sao_Paulo
        slug: equipamento_historico
        parameters:
          table_id: equipamento_historico
          dump_mode: append
          partition_columns: horaAtualizacao
          partition_date_format: "%Y-%m-%d"
          break_query_frequency: day
          break_query_start: current_day
          break_query_end: current_day
          execute_query: |
            SELECT * FROM [DBOCR_2025].[dbo].[Equipamento]
