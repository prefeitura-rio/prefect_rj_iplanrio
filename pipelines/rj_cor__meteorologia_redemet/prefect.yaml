name: rj_cor__meteorologia_redemet
prefect-version: 3.4.3

build:
  - prefect.deployments.steps.run_shell_script:
      id: get-commit-hash
      script: git rev-parse --short HEAD
      stream_output: false
  - prefect_docker.deployments.steps.build_docker_image:
      id: build-image
      requires: prefect-docker>=0.6.5
      image_name: ghcr.io/prefeitura-rio/prefect_rj_iplanrio/deployments
      tag: "rj_cor__meteorologia_redemet-{{ get-commit-hash.stdout }}"
      dockerfile: pipelines/rj_cor__meteorologia_redemet/Dockerfile

push:
  - prefect_docker.deployments.steps.push_docker_image:
      requires: prefect-docker>=0.6.5
      image_name: "{{ build-image.image_name }}"
      tag: "{{ build-image.tag }}"

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /opt/prefect/prefect_rj_iplanrio

deployments:
  - name: rj-cor--meteorologia-redemet--staging
    version: "{{ build-image.tag }}"
    entrypoint: pipelines/rj_cor__meteorologia_redemet/flow.py:rj_cor__meteorologia_redemet
    work_pool:
      name: k3s-pool
      work_queue_name: default
      job_variables:
        image: "{{ build-image.image_name }}:{{ build-image.tag }}"
        command: uv run --package rj_cor__meteorologia_redemet -- prefect flow-run execute
        secretName: prefect-jobs-secrets
        image_pull_policy: Always

  - name: rj-cor--meteorologia-redemet--prod
    version: "{{ get-commit-hash.stdout }}"
    entrypoint: pipelines/rj_cor__meteorologia_redemet/flow.py:rj_cor__meteorologia_redemet
    work_pool:
      name: k3s-pool
      work_queue_name: default
      job_variables:
        image: "{{ build-image.image_name }}:{{ build-image.tag }}"
        command: uv run --package rj_cor__meteorologia_redemet -- prefect flow-run execute
        secretName: prefect-jobs-secrets
        image_pull_policy: Always
    schedules:
      - interval: 3600
        anchor_date: "2023-01-01T00:10:00"
        timezone: America/Sao_Paulo
        slug: meteorologia-redemet-hourly
    parameters:
      dataset_id: clima_estacao_meteorologica
      table_id: meteorologia_redemet
      first_date: null
      last_date: null

  - name: rj-cor--meteorologia-redemet-estacoes--staging
    version: "{{ build-image.tag }}"
    entrypoint: pipelines/rj_cor__meteorologia_redemet/flow.py:rj_cor__meteorologia_redemet_estacoes
    work_pool:
      name: k3s-pool
      work_queue_name: default
      job_variables:
        image: "{{ build-image.image_name }}:{{ build-image.tag }}"
        command: uv run --package rj_cor__meteorologia_redemet -- prefect flow-run execute
        secretName: prefect-jobs-secrets
        image_pull_policy: Always

  - name: rj-cor--meteorologia-redemet-estacoes--prod
    version: "{{ get-commit-hash.stdout }}"
    entrypoint: pipelines/rj_cor__meteorologia_redemet/flow.py:rj_cor__meteorologia_redemet_estacoes
    work_pool:
      name: k3s-pool
      work_queue_name: default
      job_variables:
        image: "{{ build-image.image_name }}:{{ build-image.tag }}"
        command: uv run --package rj_cor__meteorologia_redemet -- prefect flow-run execute
        secretName: prefect-jobs-secrets
        image_pull_policy: Always
    schedules:
      - interval: 2592000
        anchor_date: "2023-01-01T00:12:00"
        timezone: America/Sao_Paulo
        slug: meteorologia-redemet-estacoes-monthly
        parameters:
          dataset_id: clima_estacao_meteorologica
          table_id: estacoes_redemet
