name: rj_setur__turismo_fluxo_visitantes
prefect-version: 3.4.3

build:
  - prefect.deployments.steps.run_shell_script:
      id: get-commit-hash
      script: git rev-parse --short HEAD
      stream_output: false
  - prefect_docker.deployments.steps.build_docker_image:
      id: build-image
      requires: prefect-docker>=0.6.5
      image_name: ghcr.io/prefeitura-rio/prefect_rj_iplanrio/deployments
      tag: "rj_setur__turismo_fluxo_visitantes-{{ get-commit-hash.stdout }}"
      dockerfile: pipelines/rj_setur__turismo_fluxo_visitantes/Dockerfile

push:
  - prefect_docker.deployments.steps.push_docker_image:
      requires: prefect-docker>=0.6.5
      image_name: "{{ build-image.image_name }}"
      tag: "{{ build-image.tag }}"

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /opt/prefect/prefect_rj_iplanrio

deployments:
  - name: rj-setur--turismo-fluxo-visitantes--staging
    version: "{{ build-image.tag }}"
    entrypoint: pipelines/rj_setur__turismo_fluxo_visitantes/flow.py:rj_setur__turismo_fluxo_visitantes
    work_pool:
      name: default-pool
      work_queue_name: default
      job_variables:
        image: "{{ build-image.image_name }}:{{ build-image.tag }}"
        command: uv run --package rj_setur__turismo_fluxo_visitantes -- prefect flow-run execute
        secretName: prefect-jobs-secrets
        image_pull_policy: Always

  - name: rj-setur--turismo-fluxo-visitantes--prod
    version: "{{ get-commit-hash.stdout }}"
    entrypoint: pipelines/rj_setur__turismo_fluxo_visitantes/flow.py:rj_setur__turismo_fluxo_visitantes
    work_pool:
      name: default-pool
      work_queue_name: default
      job_variables:
        image: "{{ build-image.image_name }}:{{ build-image.tag }}"
        command: uv run --package rj_setur__turismo_fluxo_visitantes -- prefect flow-run execute
        secretName: prefect-jobs-secrets
        image_pull_policy: Always

    schedules:
      - interval: 86400 # Executa a cada 24 horas (diariamente)
        anchor_date: "2026-03-01T03:00:00" # Data de início do schedule em UTC
        timezone: America/Sao_Paulo
        slug: rj-setur-turismo-fluxo-visitantes-daily
        parameters:
          folder_id: "1d_SxiMsXQd2JH1Ttik3OQDRJy7wLtX6S"
          dataset_id: "brutos_turismo_fluxo_visitante"
          dump_mode: "overwrite"
